services:
  open-cowork-gateway:
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/open-cowork-gateway/Dockerfile
    environment:
      OPEN_COWORK_CONFIG_PATH: ${OPEN_COWORK_CONFIG_PATH:-}
      OPEN_COWORK_CONFIG_DIR: ${OPEN_COWORK_CONFIG_DIR:-}
      OPEN_COWORK_DOWNSTREAM_ROOT: ${OPEN_COWORK_DOWNSTREAM_ROOT:-}
      OPEN_COWORK_CLOUD_BASE_URL: ${OPEN_COWORK_CLOUD_BASE_URL:-https://cowork.example.com}
      OPEN_COWORK_GATEWAY_ALLOW_INSECURE_HTTP: ${OPEN_COWORK_GATEWAY_ALLOW_INSECURE_HTTP:-false}
      OPEN_COWORK_GATEWAY_SERVICE_TOKEN: ${OPEN_COWORK_GATEWAY_SERVICE_TOKEN:-replace-with-dashboard-gateway-token}
      OPEN_COWORK_GATEWAY_ADMIN_TOKEN: ${OPEN_COWORK_GATEWAY_ADMIN_TOKEN:-}
      OPEN_COWORK_GATEWAY_HOST: ${OPEN_COWORK_GATEWAY_HOST:-127.0.0.1}
      OPEN_COWORK_GATEWAY_PORT: ${OPEN_COWORK_GATEWAY_PORT:-8790}
      OPEN_COWORK_GATEWAY_PUBLIC_URL: ${OPEN_COWORK_GATEWAY_PUBLIC_URL:-}
      OPEN_COWORK_GATEWAY_MODE: ${OPEN_COWORK_GATEWAY_MODE:-self-host}
      OPEN_COWORK_GATEWAY_LOG_LEVEL: ${OPEN_COWORK_GATEWAY_LOG_LEVEL:-info}
      OPEN_COWORK_GATEWAY_METRICS_ENABLED: ${OPEN_COWORK_GATEWAY_METRICS_ENABLED:-false}
      OPEN_COWORK_GATEWAY_DIAGNOSTICS_ENABLED: ${OPEN_COWORK_GATEWAY_DIAGNOSTICS_ENABLED:-false}
      OPEN_COWORK_GATEWAY_ENABLE_FAKE_PROVIDER: ${OPEN_COWORK_GATEWAY_ENABLE_FAKE_PROVIDER:-false}
      OPEN_COWORK_GATEWAY_ALLOW_PUBLIC_FAKE_PROVIDER: ${OPEN_COWORK_GATEWAY_ALLOW_PUBLIC_FAKE_PROVIDER:-false}
      OPEN_COWORK_GATEWAY_FAKE_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_FAKE_CHANNEL_BINDING_ID:-fake-binding}
      OPEN_COWORK_GATEWAY_TELEGRAM_BOT_TOKEN: ${OPEN_COWORK_GATEWAY_TELEGRAM_BOT_TOKEN:-}
      OPEN_COWORK_GATEWAY_TELEGRAM_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_TELEGRAM_CHANNEL_BINDING_ID:-telegram}
      OPEN_COWORK_GATEWAY_TELEGRAM_MODE: ${OPEN_COWORK_GATEWAY_TELEGRAM_MODE:-polling}
      OPEN_COWORK_GATEWAY_TELEGRAM_PUBLIC_URL: ${OPEN_COWORK_GATEWAY_TELEGRAM_PUBLIC_URL:-}
      OPEN_COWORK_GATEWAY_TELEGRAM_WEBHOOK_SECRET: ${OPEN_COWORK_GATEWAY_TELEGRAM_WEBHOOK_SECRET:-}
      OPEN_COWORK_GATEWAY_SLACK_BOT_TOKEN: ${OPEN_COWORK_GATEWAY_SLACK_BOT_TOKEN:-}
      OPEN_COWORK_GATEWAY_SLACK_SIGNING_SECRET: ${OPEN_COWORK_GATEWAY_SLACK_SIGNING_SECRET:-}
      OPEN_COWORK_GATEWAY_SLACK_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_SLACK_CHANNEL_BINDING_ID:-slack}
      OPEN_COWORK_GATEWAY_SLACK_TEAM_ID: ${OPEN_COWORK_GATEWAY_SLACK_TEAM_ID:-}
      OPEN_COWORK_GATEWAY_EMAIL_INBOUND_SECRET: ${OPEN_COWORK_GATEWAY_EMAIL_INBOUND_SECRET:-}
      OPEN_COWORK_GATEWAY_EMAIL_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_EMAIL_CHANNEL_BINDING_ID:-email}
      OPEN_COWORK_GATEWAY_EMAIL_FROM: ${OPEN_COWORK_GATEWAY_EMAIL_FROM:-}
      OPEN_COWORK_GATEWAY_EMAIL_ADDRESS: ${OPEN_COWORK_GATEWAY_EMAIL_ADDRESS:-}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_HOST: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_HOST:-}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_PORT: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_PORT:-587}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_SECURE: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_SECURE:-false}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_USERNAME: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_USERNAME:-}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_PASSWORD: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_PASSWORD:-}
      OPEN_COWORK_GATEWAY_WEBHOOK_DELIVERY_URL: ${OPEN_COWORK_GATEWAY_WEBHOOK_DELIVERY_URL:-}
      OPEN_COWORK_GATEWAY_WEBHOOK_SHARED_SECRET: ${OPEN_COWORK_GATEWAY_WEBHOOK_SHARED_SECRET:-}
      OPEN_COWORK_GATEWAY_WEBHOOK_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_WEBHOOK_CHANNEL_BINDING_ID:-webhook}
    ports:
      - "${OPEN_COWORK_GATEWAY_PUBLISHED_ADDR:-127.0.0.1}:${OPEN_COWORK_GATEWAY_PUBLISHED_PORT:-8790}:${OPEN_COWORK_GATEWAY_PORT:-8790}"
    volumes:
      - ${OPEN_COWORK_CONFIG_PATH:-./open-cowork.config.json}:${OPEN_COWORK_CONFIG_PATH:-/etc/open-cowork/open-cowork.config.json}:ro
      - ${OPEN_COWORK_CONFIG_DIR:-.}:${OPEN_COWORK_CONFIG_DIR:-/etc/open-cowork/config}:ro
      - ${OPEN_COWORK_DOWNSTREAM_ROOT:-.}:${OPEN_COWORK_DOWNSTREAM_ROOT:-/etc/open-cowork/downstream}:ro
