version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Fold minor + patch dep bumps into grouped PRs so the review queue
    # stays sane; major bumps still land individually because they need
    # deliberate review.
    # The OpenCode engine pair is exact-pinned and upgraded deliberately:
    # bumps must re-verify the compatibility registry and the runtime
    # contract fixture (tests/fixtures/opencode-runtime-contract.json)
    # across every workspace that pins it, so Dependabot must not touch it.
    ignore:
      - dependency-name: "opencode-ai"
      - dependency-name: "@opencode-ai/sdk"
    groups:
      vite-major:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
        update-types:
          - major
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Actions are SHA-pinned for supply-chain safety. Dependabot
    # re-resolves the `# v4` trailing-comment hint and opens a PR
    # with the new SHA when upstream ships a release, so we rotate
    # pins with a paper trail rather than inheriting updates silently.
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/docker/open-cowork-cloud"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/docker/open-cowork-gateway"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/docs"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      docs-python:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(docs)"
      include: "scope"
