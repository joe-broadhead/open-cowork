name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Performance gate
        run: pnpm perf:check

      - name: Build all (shared → MCPs → desktop)
        run: pnpm build

  # Smoke-build the desktop app on macOS so platform-specific regressions
  # (IPC, window lifecycle, code signing hooks, native modules) surface on
  # every PR instead of only when we cut a release tag. Packaging is
  # intentionally unsigned here — this is a compile + bundle check, not a
  # releasable artifact.
  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + MCPs + desktop renderer
        run: pnpm build

      - name: Package desktop app (unsigned smoke)
        run: pnpm --dir apps/desktop dist:ci:mac

      - name: Verify artifact exists
        run: |
          test -d apps/desktop/release || (echo "Expected apps/desktop/release/ after dist:ci:mac" && exit 1)
          ls apps/desktop/release

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict
