name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Git diff check
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff-tree --check --root --no-commit-id -r HEAD
          fi

      - name: Dependency review
        # dependency-review-action is only available when GitHub's
        # dependency graph/review backend is enabled. Keep it enforced
        # for public PRs, while private pre-release PRs rely on the
        # production `pnpm audit` gate below.
        if: github.event_name == 'pull_request' && github.event.repository.private == false
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Audit full dependency graph (critical advisory)
        run: pnpm audit --audit-level critical
        continue-on-error: true

      - name: Verify third-party notices
        run: |
          node scripts/generate-third-party-notices.mjs --skip-license-output
          git diff --exit-code THIRD_PARTY_NOTICES.md || {
            echo "::error::THIRD_PARTY_NOTICES.md is stale. Run 'pnpm notices' and commit the result."
            exit 1
          }
          node scripts/verify-third-party-license-files.mjs

      - name: Lint
        run: pnpm lint

      - name: Lint (a11y)
        run: pnpm lint:a11y --max-warnings=0

      - name: Test
        run: pnpm test

      - name: Renderer component tests
        run: pnpm test:renderer

      - name: Typecheck
        run: pnpm typecheck

      - name: Performance gate
        run: pnpm perf:check

      - name: Build all (shared → MCPs → desktop)
        run: pnpm build

  # Run the desktop smoke suite and package the app on macOS so
  # platform-specific regressions (IPC, renderer boot, native modules,
  # packaging hooks) surface on every PR instead of only when we cut a
  # release tag. Packaging is intentionally unsigned here — this is a
  # validation gate, not a releasable artifact.
  macos-build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run desktop smoke tests
        run: pnpm test:e2e

      - name: Package desktop app (unsigned smoke)
        run: pnpm --dir apps/desktop dist:ci

      - name: Ad-hoc sign packaged app for smoke launch
        run: find apps/desktop/release -depth -type d -name "*.app" -exec codesign --force --deep --sign - {} \;

      - name: Resolve packaged desktop executable
        id: packaged-executable
        run: echo "path=$(node scripts/find-macos-packaged-executable.mjs)" >> "$GITHUB_OUTPUT"

      - name: Run packaged desktop smoke test
        run: pnpm --dir apps/desktop test:e2e:packaged
        env:
          OPEN_COWORK_PACKAGED_EXECUTABLE: ${{ steps.packaged-executable.outputs.path }}

      - name: Verify release artifacts exist
        run: |
          test -d apps/desktop/release || (echo "Expected apps/desktop/release/ after dist:ci:mac" && exit 1)
          ls apps/desktop/release

  linux-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package Linux desktop app
        run: pnpm --dir apps/desktop dist:ci:linux

      - name: Verify Linux artifacts exist
        run: |
          test -d apps/desktop/release || (echo "Expected apps/desktop/release/ after dist:ci:linux" && exit 1)
          ls apps/desktop/release

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPEN_COWORK_REPO_URL: https://github.com/joe-broadhead/open-cowork
      OPEN_COWORK_REPO_NAME: joe-broadhead/open-cowork
      OPEN_COWORK_SITE_URL: https://joe-broadhead.github.io/open-cowork/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict

  # Coverage ratchet. The thresholds start from the measured Node and
  # renderer baselines so coverage drops fail loudly without forcing
  # shallow tests around hard-to-mock Electron paths.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @open-cowork/shared build

      - name: Run Node tests with coverage
        run: pnpm test:coverage:node

      - name: Run renderer tests with coverage
        run: pnpm test:coverage:renderer

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: coverage
          if-no-files-found: warn
