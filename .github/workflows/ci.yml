name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared
        run: pnpm build:shared

      - name: Typecheck desktop
        run: pnpm --filter @cowork/desktop build:electron

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build all (shared → MCPs → desktop)
        run: pnpm build

      - name: Package desktop app (zip)
        run: pnpm --filter @cowork/desktop dist:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
