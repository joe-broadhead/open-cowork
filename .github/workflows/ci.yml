name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Verify third-party notices
        run: |
          pnpm notices
          git diff --exit-code THIRD_PARTY_NOTICES.md || {
            echo "::error::THIRD_PARTY_NOTICES.md is stale. Run 'pnpm notices' and commit the result."
            exit 1
          }

      - name: Lint
        run: pnpm lint

      - name: Lint (a11y)
        run: pnpm lint:a11y --max-warnings=0

      - name: Git diff check
        run: git diff --check

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Performance gate
        run: pnpm perf:check

      - name: Build all (shared → MCPs → desktop)
        run: pnpm build

  # Run the desktop smoke suite and package the app on macOS so
  # platform-specific regressions (IPC, renderer boot, native modules,
  # packaging hooks) surface on every PR instead of only when we cut a
  # release tag. Packaging is intentionally unsigned here — this is a
  # validation gate, not a releasable artifact.
  macos-build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run desktop smoke tests
        run: pnpm test:e2e

      - name: Package desktop app (unsigned smoke)
        run: pnpm --dir apps/desktop dist:ci

      - name: Ad-hoc sign packaged app for smoke launch
        run: find apps/desktop/release -depth -type d -name "*.app" -exec codesign --force --deep --sign - {} \;

      - name: Resolve packaged desktop executable
        id: packaged-executable
        run: echo "path=$(node scripts/find-macos-packaged-executable.mjs)" >> "$GITHUB_OUTPUT"

      - name: Run packaged desktop smoke test
        run: pnpm --dir apps/desktop test:e2e:packaged
        env:
          OPEN_COWORK_PACKAGED_EXECUTABLE: ${{ steps.packaged-executable.outputs.path }}

      - name: Verify release artifacts exist
        run: |
          test -d apps/desktop/release || (echo "Expected apps/desktop/release/ after dist:ci:mac" && exit 1)
          ls apps/desktop/release

  linux-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package Linux desktop app
        run: pnpm --dir apps/desktop dist:ci:linux

      - name: Verify Linux artifacts exist
        run: |
          test -d apps/desktop/release || (echo "Expected apps/desktop/release/ after dist:ci:linux" && exit 1)
          ls apps/desktop/release

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPEN_COWORK_REPO_URL: https://github.com/joe-broadhead/open-cowork
      OPEN_COWORK_REPO_NAME: joe-broadhead/open-cowork
      OPEN_COWORK_SITE_URL: https://joe-broadhead.github.io/open-cowork/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict

  # Coverage reporting — advisory only. We don't gate on a coverage
  # threshold yet because the unit test suite deliberately skips
  # hard-to-mock Electron-dependent paths; a floor would just encourage
  # shallow wrappers. The artifact surfaces coverage per-file so any
  # PR that noticeably drops a hot file's coverage is visible to
  # reviewers.
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @open-cowork/shared build

      - name: Run tests with coverage
        run: |
          node --no-warnings --experimental-strip-types --experimental-test-coverage \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=lcov --test-reporter-destination=coverage.lcov \
            --test tests/*.test.ts

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: warn
