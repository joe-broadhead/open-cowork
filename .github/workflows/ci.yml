name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  TZ: UTC

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2

      - name: Git diff check
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff-tree --check --root --no-commit-id -r HEAD
          fi

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Audit full dependency graph (high advisory)
        run: pnpm audit --audit-level high

      - name: Verify third-party notices
        run: |
          node scripts/generate-third-party-notices.mjs --skip-license-output
          git diff --exit-code THIRD_PARTY_NOTICES.md || {
            echo "::error::THIRD_PARTY_NOTICES.md is stale. Run 'pnpm notices' and commit the result."
            exit 1
          }
          node scripts/verify-third-party-license-files.mjs

      - name: Lint
        run: pnpm lint

      - name: Dead code check
        run: pnpm lint:dead-code

      - name: Lint (a11y)
        run: pnpm lint:a11y --max-warnings=0

      - name: Test
        run: pnpm test

      - name: Live scenario evidence
        run: pnpm test:live-scenarios

      - name: Cloud Web Workbench browser readiness gates
        run: pnpm test:cloud-web

      - name: Renderer component tests
        run: pnpm test:renderer

      - name: Typecheck
        run: pnpm typecheck

      - name: Performance gate
        run: pnpm perf:check

      - name: Build all (packages, MCPs, gateway, website, desktop)
        run: pnpm build

  cloud-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: open_cowork_cloud_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d open_cowork_cloud_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run OpenCode portability proof
        run: pnpm proof:cloud:opencode-portability --json

      - name: Run sandbox OpenCode session proof preflight
        run: pnpm proof:sandbox:opencode-session -- --json

      - name: Run Desktop Web Gateway continuation gates
        run: pnpm test:cloud-continuation

      - name: Run real Postgres cloud concurrency tests
        run: node --no-warnings --experimental-strip-types --test tests/cloud-postgres-concurrency.test.ts
        env:
          OPEN_COWORK_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/open_cowork_cloud_test

      - name: Validate cloud Compose files
        run: |
          docker compose -f docker-compose.cloud.yml config --quiet
          docker compose -f docker-compose.cloud.split.yml config --quiet
          OPEN_COWORK_GATEWAY_SERVICE_TOKEN=ci-gateway-service-token OPEN_COWORK_GATEWAY_ADMIN_TOKEN=ci-gateway-admin-token docker compose -f docker-compose.cloud-gateway.yml config --quiet

      - name: Build cloud OCI image
        run: |
          image_tag="${GITHUB_SHA:-ci}"
          docker build -f docker/open-cowork-cloud/Dockerfile \
            -t open-cowork-cloud:ci \
            -t ghcr.io/joe-broadhead/open-cowork-cloud:"${image_tag}" \
            .

      - name: Build gateway OCI image
        run: |
          image_tag="${GITHUB_SHA:-ci}"
          docker build -f docker/open-cowork-gateway/Dockerfile \
            -t open-cowork-gateway:ci \
            -t ghcr.io/joe-broadhead/open-cowork-gateway:"${image_tag}" \
            .

      - name: Run split-role cloud Compose smoke test
        run: bash scripts/ci-cloud-compose-smoke.sh docker-compose.cloud.split.yml

      - name: Run cloud plus gateway Compose smoke test
        run: OPEN_COWORK_GATEWAY_SERVICE_TOKEN=ci-gateway-service-token OPEN_COWORK_GATEWAY_ADMIN_TOKEN=ci-gateway-admin-token OPEN_COWORK_GATEWAY_ENABLE_FAKE_PROVIDER=true OPEN_COWORK_GATEWAY_ALLOW_PUBLIC_FAKE_PROVIDER=true OPEN_COWORK_GATEWAY_SMOKE_URL=http://127.0.0.1:8790/ready bash scripts/ci-cloud-compose-smoke.sh docker-compose.cloud-gateway.yml

      - name: Install Helm
        run: |
          HELM_VERSION=3.18.6
          curl -fsSLO "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLO "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz.sha256sum"
          sha256sum -c "helm-v${HELM_VERSION}-linux-amd64.tar.gz.sha256sum"
          tar -xzf "helm-v${HELM_VERSION}-linux-amd64.tar.gz"
          sudo install linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Validate cloud Helm chart
        run: |
          helm dependency build helm/open-cowork-cloud
          helm lint helm/open-cowork-cloud \
            --set cloud.auth.mode=oidc \
            --set cloud.auth.oidcIssuerUrl=https://issuer.example.com \
            --set cloud.auth.oidcClientId=open-cowork-cloud-ci
          helm template open-cowork-cloud helm/open-cowork-cloud \
            --set image.repository=example.com/open-cowork-cloud \
            --set image.tag=ci \
            --set cloud.auth.mode=oidc \
            --set cloud.auth.oidcIssuerUrl=https://issuer.example.com \
            --set cloud.auth.oidcClientId=open-cowork-cloud-ci \
            --set cloud.controlPlaneUrl='postgres://postgres:postgres@postgres:5432/open_cowork_cloud_test' \
            --set cloud.secretKey='ci-secret-key' \
            --set cloud.cookieSecret='ci-cookie-secret' \
            --set cloud.objectStore.kind=s3 \
            --set cloud.objectStore.bucket=open-cowork-cloud-ci \
            > /tmp/open-cowork-cloud-rendered.yaml
          test -s /tmp/open-cowork-cloud-rendered.yaml
          grep -q "OPEN_COWORK_CLOUD_ROLE" /tmp/open-cowork-cloud-rendered.yaml
          helm template open-cowork-cloud-with-gateway helm/open-cowork-cloud \
            --set image.repository=example.com/open-cowork-cloud \
            --set image.tag=ci \
            --set cloud.auth.mode=oidc \
            --set cloud.auth.oidcIssuerUrl=https://issuer.example.com \
            --set cloud.auth.oidcClientId=open-cowork-cloud-ci \
            --set cloud.controlPlaneUrl='postgres://postgres:postgres@postgres:5432/open_cowork_cloud_test' \
            --set cloud.secretKey='ci-secret-key' \
            --set cloud.cookieSecret='ci-cookie-secret' \
            --set cloud.objectStore.kind=s3 \
            --set cloud.objectStore.bucket=open-cowork-cloud-ci \
            --set gateway.enabled=true \
            --set gateway.gateway.cloudBaseUrl=https://cloud.example.com \
            --set gateway.gateway.serviceToken=ci-gateway-token \
            --set gateway.gateway.adminToken=ci-gateway-admin-token \
            --set gateway.gateway.telegram.botToken=ci-telegram-token \
            > /tmp/open-cowork-cloud-with-gateway-rendered.yaml
          grep -q "OPEN_COWORK_GATEWAY_SERVICE_TOKEN" /tmp/open-cowork-cloud-with-gateway-rendered.yaml

      - name: Validate gateway Helm chart
        run: |
          helm lint helm/open-cowork-gateway \
            --set gateway.cloudBaseUrl=https://cloud.example.com \
            --set gateway.serviceToken=ci-gateway-token \
            --set gateway.adminToken=ci-gateway-admin-token \
            --set gateway.telegram.botToken=ci-telegram-token
          helm template open-cowork-gateway helm/open-cowork-gateway \
            --set image.repository=example.com/open-cowork-gateway \
            --set image.tag=ci \
            --set gateway.cloudBaseUrl=https://cloud.example.com \
            --set gateway.serviceToken=ci-gateway-token \
            --set gateway.adminToken=ci-gateway-admin-token \
            --set gateway.telegram.botToken=ci-telegram-token \
            > /tmp/open-cowork-gateway-rendered.yaml
          test -s /tmp/open-cowork-gateway-rendered.yaml
          grep -q "OPEN_COWORK_GATEWAY_SERVICE_TOKEN" /tmp/open-cowork-gateway-rendered.yaml

      - name: Run deployment readiness validator
        run: pnpm deploy:validate -- --require-tools

      - name: Run launch readiness validator
        run: pnpm deploy:launch:validate

      - name: Run launch evidence manifest validator
        run: pnpm deploy:launch:evidence:validate

      - name: Run release promotion contract validator
        run: pnpm deploy:promotion:validate -- --tier local-self-host-beta

      - name: Run private beta launch package validator
        run: pnpm deploy:private-beta:validate

      - name: Run standalone gateway validator
        run: pnpm deploy:standalone-gateway:validate

      - name: Run operations readiness validator
        run: pnpm ops:validate

  # Run the desktop smoke suite and package the app on macOS so
  # platform-specific regressions (IPC, renderer boot, native modules,
  # packaging hooks) surface on every PR instead of only when we cut a
  # release tag. Packaging is intentionally unsigned here — this is a
  # validation gate, not a releasable artifact.
  macos-build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set reproducible build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Node unit tests
        run: pnpm test

      - name: Run renderer component tests
        run: pnpm test:renderer

      - name: Run desktop smoke tests
        run: pnpm test:e2e

      - name: Package desktop app (unsigned smoke)
        run: pnpm --dir apps/desktop dist:ci:mac

      - name: Ad-hoc sign packaged app for smoke launch
        run: find apps/desktop/release -depth -type d -name "*.app" -exec codesign --force --deep --sign - {} \;

      - name: Resolve packaged desktop executable
        id: packaged-executable
        run: echo "path=$(node scripts/find-macos-packaged-executable.mjs)" >> "$GITHUB_OUTPUT"

      - name: Run packaged desktop smoke test
        run: pnpm --dir apps/desktop test:e2e:packaged
        env:
          OPEN_COWORK_PACKAGED_EXECUTABLE: ${{ steps.packaged-executable.outputs.path }}

      - name: Verify release artifacts exist
        run: |
          test -d apps/desktop/release || (echo "Expected apps/desktop/release/ after dist:ci:mac" && exit 1)
          ls apps/desktop/release

  linux-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set reproducible build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm xvfb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linux desktop smoke tests
        run: xvfb-run -a pnpm test:e2e

      - name: Package Linux desktop app
        run: pnpm --dir apps/desktop dist:ci:linux

      - name: Resolve Linux packaged executable
        id: linux-packaged-executable
        run: echo "path=$(node scripts/find-linux-packaged-executable.mjs)" >> "$GITHUB_OUTPUT"

      - name: Run Linux packaged desktop smoke test
        run: xvfb-run -a pnpm --dir apps/desktop test:e2e:packaged
        env:
          OPEN_COWORK_PACKAGED_EXECUTABLE: ${{ steps.linux-packaged-executable.outputs.path }}

      - name: Verify Linux artifacts exist
        run: |
          test -d apps/desktop/release || (echo "Expected apps/desktop/release/ after dist:ci:linux" && exit 1)
          ls apps/desktop/release

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPEN_COWORK_REPO_URL: https://github.com/joe-broadhead/open-cowork
      OPEN_COWORK_REPO_NAME: joe-broadhead/open-cowork
      OPEN_COWORK_SITE_URL: https://joe-broadhead.github.io/open-cowork/
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

  # Coverage ratchet. The thresholds start from the measured Node and
  # renderer baselines so coverage drops fail loudly without forcing
  # shallow tests around hard-to-mock Electron paths.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @open-cowork/shared build

      - name: Run Node tests with coverage
        run: pnpm test:coverage:node

      - name: Run renderer tests with coverage
        run: pnpm test:coverage:renderer

      - name: Generate coverage summary
        run: node scripts/coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/comment-coverage-report.mjs

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: coverage
          if-no-files-found: warn
          retention-days: 14
