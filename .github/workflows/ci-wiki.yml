name: CI Wiki

on:
  pull_request:
    paths:
      - 'products/wiki/**'
      - '.github/workflows/ci-wiki.yml'
      - 'scripts/check-product-boundaries.mjs'
  push:
    branches: [master]
    paths:
      - 'products/wiki/**'
      - '.github/workflows/ci-wiki.yml'

concurrency:
  group: ci-wiki-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.32.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Product boundaries
        run: pnpm boundaries:check

      - name: Typecheck Wiki workspace
        run: pnpm --filter cowork-wiki-workspace typecheck

      - name: Test Wiki (unit)
        run: pnpm --filter cowork-wiki-workspace test

      - name: Build Wiki CLI pack
        run: pnpm --filter cowork-wiki-workspace pack:cli
