name: Docs

on:
  push:
    branches: [master]
  # GitHub's `public` event fires when the repository visibility changes
  # from private to public, which lets the docs deploy after launch.
  public:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Attempt a Pages deploy while the repository is private"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPEN_COWORK_REPO_URL: https://github.com/joe-broadhead/open-cowork
      OPEN_COWORK_REPO_NAME: joe-broadhead/open-cowork
      OPEN_COWORK_SITE_URL: https://joe-broadhead.github.io/open-cowork/
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    if: github.event.repository.private == false || (github.event_name == 'workflow_dispatch' && inputs.deploy_pages == true)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy docs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
