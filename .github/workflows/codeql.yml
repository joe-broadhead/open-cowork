name: CodeQL

# Monthly deep scan only. Full monorepo CodeQL regularly times out / burns
# multi-hour Action minutes on PR and per-push paths; product gates stay on CI.
# Manual re-run: workflow_dispatch.
on:
  schedule:
    # 03:23 UTC on the 1st of each month
    - cron: '23 3 1 * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Deep monorepo pack; monthly only so a long budget is acceptable.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.32.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Build
        run: pnpm build

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: ${{ github.event.repository.private == true && 'never' || 'always' }}
          wait-for-processing: ${{ github.event.repository.private == false }}

      - name: Upload CodeQL SARIF artifact
        if: github.event.repository.private == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: codeql-results/*.sarif
          if-no-files-found: error
          retention-days: 14
