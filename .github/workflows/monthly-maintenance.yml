name: Monthly Maintenance

# Scheduled drift catch. The goal is to surface dependency advisories
# and SDK incompatibilities BEFORE a release cycle catches them, so
# the first time we hear about a new CVE or a breaking upstream SDK
# change is on a no-stakes dry-run rather than during a release push.
#
# Nothing here gates the release workflow — `on: push tags: v*` still
# does that. This job alerts via GitHub's default notifications on
# failure so maintainers see drift on a predictable monthly cadence.

on:
  schedule:
    # 02:00 UTC on the first day of each month.
    - cron: "0 2 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: monthly-maintenance
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production audit (high + moderate)
        run: pnpm audit --prod --audit-level moderate
        continue-on-error: false

      - name: Report outdated packages (advisory only)
        run: pnpm outdated || true
        continue-on-error: true

      - name: Typecheck with pinned OpenCode packages
        run: pnpm typecheck

      - name: Test with pinned OpenCode packages
        run: pnpm test

      # Opt-in compatibility probe. Reinstall the latest paired
      # @opencode-ai/sdk client and opencode-ai runtime package as a
      # fail-closed step so registry/package resolution failures are
      # visible. The typecheck/test probe below remains advisory because
      # upstream API drift is a signal to update or knowingly keep the
      # current pin, not proof that the pinned release is broken.
      - name: Install latest OpenCode packages for compatibility probe
        run: |
          pnpm --filter @open-cowork/desktop add @opencode-ai/sdk@latest opencode-ai@latest

      - name: Probe compatibility with latest OpenCode packages
        id: sdk-probe
        continue-on-error: true
        run: |
          pnpm typecheck
          pnpm test

      - name: Mark SDK probe status
        if: steps.sdk-probe.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::warning title=OpenCode drift::latest paired OpenCode packages break typecheck or tests. Review before release."
          title="OpenCode SDK compatibility drift"
          body="$(cat <<EOF
          The monthly maintenance workflow found that installing the latest paired @opencode-ai/sdk and opencode-ai packages breaks typecheck or tests.

          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Review the upstream changes, then either update the pinned OpenCode packages with fixes or keep the current pin intentionally.
          EOF
          )"
          existing="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
