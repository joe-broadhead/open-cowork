name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS release artifacts
        run: pnpm --dir apps/desktop dist:ci:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos
          if-no-files-found: error
          path: |
            apps/desktop/release/*.zip
            apps/desktop/release/*.dmg
            apps/desktop/release/*.blockmap

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux release artifacts
        run: pnpm --dir apps/desktop dist:ci:linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-linux
          if-no-files-found: error
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.blockmap

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist-artifacts

      - name: Generate checksums
        run: |
          cd dist-artifacts
          find . -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      # SBOMs are enterprise table stakes for supply-chain review. We
      # check out the source at the tag, then generate both CycloneDX
      # and SPDX flavors so downstream consumers can use whichever
      # their scanner prefers. Generation runs against the source
      # manifests (package.json / pnpm-lock), not the packaged binaries
      # — the package set is identical across macOS and Linux, so one
      # SBOM per format covers both artifacts.
      - name: Checkout source for SBOM generation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: source

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          path: source
          format: cyclonedx-json
          output-file: dist-artifacts/sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          path: source
          format: spdx-json
          output-file: dist-artifacts/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      # Regenerate checksums so the SBOMs are covered by SHA256SUMS.txt
      # for tamper-evidence — the first checksum run above didn't see
      # them because they hadn't been generated yet.
      - name: Re-generate checksums with SBOMs included
        run: |
          cd dist-artifacts
          find . -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist-artifacts/**/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: dist-artifacts/**/*
