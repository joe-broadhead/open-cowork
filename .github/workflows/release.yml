name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  TZ: UTC

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
      checks: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Verify tag matches package version
        run: |
          root_version="$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')"
          desktop_version="$(node -p 'JSON.parse(require("node:fs").readFileSync("apps/desktop/package.json", "utf8")).version')"
          if [ "$desktop_version" != "$root_version" ]; then
            echo "::error::apps/desktop/package.json version $desktop_version does not match root package.json version $root_version."
            exit 1
          fi
          expected="v${root_version}"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME does not match package.json version $expected."
            exit 1
          fi

      - name: Verify changelog entry exists
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! grep -Eq "^## \\[${version}\\]( - [0-9]{4}-[0-9]{2}-[0-9]{2})?$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a release entry for ${version}."
            exit 1
          fi

      - name: Verify tag points at master
        run: |
          git fetch origin master --depth=1
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          master_commit="$(git rev-parse origin/master)"
          if [ "$tag_commit" != "$master_commit" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME must point at origin/master. Tag commit: $tag_commit; origin/master: $master_commit."
            exit 1
          fi

      - name: Verify release tag signature
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/verify-release-tag-signature.mjs

      - name: Verify release actor
        env:
          OPEN_COWORK_RELEASE_ALLOWED_ACTORS: ${{ vars.OPEN_COWORK_RELEASE_ALLOWED_ACTORS }}
        run: node scripts/verify-release-actor.mjs

      - name: Verify release commit checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPEN_COWORK_RELEASE_REQUIRED_CHECKS: ${{ vars.OPEN_COWORK_RELEASE_REQUIRED_CHECKS }}
        run: node scripts/verify-release-checks.mjs

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Audit full dependency graph (high advisory)
        run: pnpm audit --audit-level high

      - name: Lint
        run: pnpm lint

      - name: Accessibility lint
        run: pnpm lint:a11y --max-warnings=0

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Cloud Web Workbench browser readiness gates
        run: pnpm test:cloud-web

      - name: Desktop Web Gateway continuation gates
        run: pnpm test:cloud-continuation

      - name: Renderer component tests
        run: pnpm test:renderer

      - name: Performance gate
        run: pnpm perf:check

      - name: Strict docs build
        run: pnpm docs:build

      - name: Validate cloud Compose files
        run: |
          docker compose -f docker-compose.cloud.yml config --quiet
          docker compose -f docker-compose.cloud.split.yml config --quiet
          OPEN_COWORK_GATEWAY_ADMIN_TOKEN=release-gateway-admin-token docker compose -f docker-compose.cloud-gateway.yml config --quiet

      - name: Install Helm
        run: |
          HELM_VERSION=3.18.6
          curl -fsSLO "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLO "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz.sha256sum"
          sha256sum -c "helm-v${HELM_VERSION}-linux-amd64.tar.gz.sha256sum"
          tar -xzf "helm-v${HELM_VERSION}-linux-amd64.tar.gz"
          sudo install linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Validate Helm charts
        run: |
          helm dependency build helm/open-cowork-cloud
          helm lint helm/open-cowork-cloud \
            --set cloud.auth.mode=oidc \
            --set cloud.auth.oidcIssuerUrl=https://issuer.example.com \
            --set cloud.auth.oidcClientId=open-cowork-cloud-release
          helm template open-cowork-cloud helm/open-cowork-cloud \
            --set image.repository=example.com/open-cowork-cloud \
            --set image.tag="${GITHUB_REF_NAME}" \
            --set cloud.auth.mode=oidc \
            --set cloud.auth.oidcIssuerUrl=https://issuer.example.com \
            --set cloud.auth.oidcClientId=open-cowork-cloud-release \
            --set cloud.controlPlaneUrl='postgres://postgres:postgres@postgres:5432/open_cowork_cloud_release' \
            --set cloud.secretKey='release-secret-key' \
            --set cloud.cookieSecret='release-cookie-secret' \
            --set cloud.objectStore.kind=s3 \
            --set cloud.objectStore.bucket=open-cowork-cloud-release \
            > /tmp/open-cowork-cloud-release-rendered.yaml
          test -s /tmp/open-cowork-cloud-release-rendered.yaml
          helm lint helm/open-cowork-gateway \
            --set gateway.cloudBaseUrl=https://cloud.example.com \
            --set gateway.serviceToken=release-gateway-token \
            --set gateway.adminToken=release-gateway-admin-token \
            --set gateway.telegram.botToken=release-telegram-token
          helm template open-cowork-gateway helm/open-cowork-gateway \
            --set image.repository=example.com/open-cowork-gateway \
            --set image.tag="${GITHUB_REF_NAME}" \
            --set gateway.cloudBaseUrl=https://cloud.example.com \
            --set gateway.serviceToken=release-gateway-token \
            --set gateway.adminToken=release-gateway-admin-token \
            --set gateway.telegram.botToken=release-telegram-token \
            > /tmp/open-cowork-gateway-release-rendered.yaml
          test -s /tmp/open-cowork-gateway-release-rendered.yaml

      - name: Materialize hosted promotion evidence manifest
        if: vars.OPEN_COWORK_RELEASE_CLAIM_TIER != '' && vars.OPEN_COWORK_RELEASE_CLAIM_TIER != 'local-self-host-beta'
        env:
          OPEN_COWORK_RELEASE_CLAIM_TIER: ${{ vars.OPEN_COWORK_RELEASE_CLAIM_TIER }}
          OPEN_COWORK_PROMOTION_EVIDENCE_MANIFEST_B64: ${{ secrets.OPEN_COWORK_PROMOTION_EVIDENCE_MANIFEST_B64 }}
        run: |
          if [ -z "$OPEN_COWORK_PROMOTION_EVIDENCE_MANIFEST_B64" ]; then
            echo "::error::Set OPEN_COWORK_PROMOTION_EVIDENCE_MANIFEST_B64 for hosted release claim tier ${OPEN_COWORK_RELEASE_CLAIM_TIER}."
            exit 1
          fi
          manifest_path="${RUNNER_TEMP}/open-cowork-promotion-evidence.json"
          printf '%s' "$OPEN_COWORK_PROMOTION_EVIDENCE_MANIFEST_B64" | base64 --decode > "$manifest_path"
          chmod 600 "$manifest_path"
          echo "OPEN_COWORK_PROMOTION_EVIDENCE_MANIFEST=$manifest_path" >> "$GITHUB_ENV"

      - name: Deployment and launch readiness gates
        env:
          OPEN_COWORK_RELEASE_CLAIM_TIER: ${{ vars.OPEN_COWORK_RELEASE_CLAIM_TIER || 'local-self-host-beta' }}
        run: |
          pnpm deploy:validate -- --require-tools
          pnpm deploy:launch:validate
          pnpm deploy:launch:evidence:validate
          pnpm deploy:promotion:validate -- --tier "${OPEN_COWORK_RELEASE_CLAIM_TIER}"
          pnpm deploy:private-beta:validate
          pnpm deploy:standalone-gateway:validate
          pnpm ops:validate

      - name: Whitespace check
        run: git diff --check

  build-macos:
    needs: release-preflight
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      signing-mode: ${{ steps.signing.outputs.mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set reproducible build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `@open-cowork/shared` is a workspace package whose `main`/`exports`
      # points at compiled output. Vite's packaging step can't resolve it
      # until tsc has emitted that output, so we explicitly build shared
      # before handing off to electron-builder. Matches the chain that
      # ci.yml's `pnpm build` runs.
      - name: Build shared workspace package
        run: pnpm --filter @open-cowork/shared build

      - name: Resolve macOS signing mode
        id: signing
        run: node .github/scripts/release-signing-mode.mjs >> "$GITHUB_OUTPUT"
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          OPEN_COWORK_ALLOW_UNSIGNED_RELEASES: ${{ vars.OPEN_COWORK_ALLOW_UNSIGNED_RELEASES }}

      - name: Build macOS release artifacts
        if: steps.signing.outputs.mode == 'signed'
        run: pnpm --dir apps/desktop dist:ci:mac
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Brand vars are referenced by electron-builder.yml (artifact
          # name template, appId, productName). The pnpm script sets
          # them inline for `pnpm build`, but `electron-builder` later
          # in the same `&&` chain runs as a separate process and does
          # not inherit them — setting them at the workflow scope is
          # the only way to guarantee electron-builder sees them.
          APP_PRODUCT_NAME: Open Cowork
          APP_ID: com.opencowork.desktop
          APP_ARTIFACT_PREFIX: Open-Cowork
          OPEN_COWORK_SIGNED_UPDATE_INSTALL_ELIGIBLE: true
          OPEN_COWORK_UPDATE_FEED_CONFIGURED: true

      - name: Build macOS release artifacts (unsigned preview override)
        if: steps.signing.outputs.mode == 'unsigned'
        run: pnpm --dir apps/desktop dist:ci:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APP_PRODUCT_NAME: Open Cowork
          APP_ID: com.opencowork.desktop
          APP_ARTIFACT_PREFIX: Open-Cowork

      - name: Resolve packaged desktop executable
        id: packaged-executable
        run: echo "path=$(node scripts/find-macos-packaged-executable.mjs)" >> "$GITHUB_OUTPUT"

      - name: Run packaged desktop smoke test
        run: pnpm --dir apps/desktop test:e2e:packaged
        env:
          OPEN_COWORK_PACKAGED_EXECUTABLE: ${{ steps.packaged-executable.outputs.path }}
          OPEN_COWORK_EXPECT_SIGNED_UPDATE_INSTALL: ${{ steps.signing.outputs.mode == 'signed' }}

      - name: Verify macOS signing and notarization
        if: steps.signing.outputs.mode == 'signed'
        run: |
          app_count=0
          while IFS= read -r -d '' app_bundle; do
            app_count=$((app_count + 1))
            codesign --verify --deep --strict --verbose=2 "$app_bundle"
            spctl -a -vv -t exec "$app_bundle"
            xcrun stapler validate "$app_bundle"
          done < <(find apps/desktop/release -type d -name "*.app" -print0)
          test "$app_count" -gt 0

          dmg_count=0
          while IFS= read -r -d '' dmg; do
            dmg_count=$((dmg_count + 1))
            spctl -a -vv -t open --context context:primary-signature "$dmg"
            xcrun stapler validate "$dmg"
          done < <(find apps/desktop/release -type f -name "*.dmg" -print0)
          test "$dmg_count" -gt 0

      - name: Upload signed macOS artifacts
        if: steps.signing.outputs.mode == 'signed'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/desktop/release/*.zip
            apps/desktop/release/*.dmg
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml

      - name: Upload unsigned macOS artifacts
        if: steps.signing.outputs.mode == 'unsigned'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/desktop/release/*.zip
            apps/desktop/release/*.dmg
            apps/desktop/release/*.blockmap

  build-linux:
    needs: release-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set reproducible build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm xvfb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared workspace package
        run: pnpm --filter @open-cowork/shared build

      - name: Build Linux release artifacts
        run: pnpm --dir apps/desktop dist:ci:linux
        env:
          APP_PRODUCT_NAME: Open Cowork
          APP_ID: com.opencowork.desktop
          APP_ARTIFACT_PREFIX: Open-Cowork
          APP_MAINTAINER: ${{ vars.APP_MAINTAINER || 'Open Cowork Maintainers <joe-broadhead@users.noreply.github.com>' }}

      - name: Resolve Linux packaged executable
        id: linux-packaged-executable
        run: echo "path=$(node scripts/find-linux-packaged-executable.mjs)" >> "$GITHUB_OUTPUT"

      - name: Run Linux packaged desktop smoke test
        run: xvfb-run -a pnpm --dir apps/desktop test:e2e:packaged
        env:
          OPEN_COWORK_PACKAGED_EXECUTABLE: ${{ steps.linux-packaged-executable.outputs.path }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.blockmap

  release-policy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enforce macOS signing policy
        run: |
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          signing_mode="${{ needs.build-macos.outputs.signing-mode }}"
          if [ "$signing_mode" = "signed" ]; then
            echo "Signed macOS artifacts are available."
            exit 0
          fi
          if [ "$major" = "0" ]; then
            echo "::warning::Publishing unsigned macOS artifacts for ${GITHUB_REF_NAME}. This is permitted only for v0.x public-preview releases."
            exit 0
          fi
          echo "::error::Unsigned macOS artifacts are not allowed for ${GITHUB_REF_NAME}. Configure signing/notarization secrets before tagging v1.0.0 or later."
          exit 1

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist-artifacts

      - name: Verify release artifacts
        run: |
          signing_mode="${{ needs.build-macos.outputs.signing-mode }}"
          node scripts/verify-release-artifact-matrix.mjs \
            --root dist-artifacts \
            --version "${GITHUB_REF_NAME#v}" \
            --signing-mode "$signing_mode"

      - name: Enforce Linux signing policy
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.OPEN_COWORK_RELEASE_GPG_PRIVATE_KEY }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          if [ "$major" != "0" ]; then
            if [ -z "$RELEASE_GPG_PRIVATE_KEY" ]; then
              echo "::error::Linux releases v1.0.0 and later require OPEN_COWORK_RELEASE_GPG_PRIVATE_KEY so SHA256SUMS.txt can be detached-signed."
              exit 1
            fi
            echo "Linux checksum signing key is configured for ${GITHUB_REF_NAME}."
            exit 0
          fi
          if [ -n "$RELEASE_GPG_PRIVATE_KEY" ]; then
            echo "Linux checksum signing key is configured for ${GITHUB_REF_NAME}."
          else
            echo "Linux artifacts are intentionally unsigned for ${GITHUB_REF_NAME}; v0.x relies on SHA256SUMS.txt plus GitHub provenance."
          fi

      - name: Confirm release policy
        run: echo "Release policy passed for ${GITHUB_REF_NAME}; GitHub Release publication may proceed."

  publish-oci-images:
    if: startsWith(github.ref, 'refs/tags/v') && needs.release-policy.result == 'success'
    needs:
      - release-policy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: release-publish
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      cloud-image: ${{ steps.cloud-meta.outputs.image }}
      cloud-digest: ${{ steps.cloud-meta.outputs.digest }}
      gateway-image: ${{ steps.gateway-meta.outputs.image }}
      gateway-digest: ${{ steps.gateway-meta.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build and publish cloud OCI staging image
        id: cloud-meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          short_sha="${GITHUB_SHA::12}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/open-cowork-cloud"
          staging_tag="${image}:release-candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${short_sha}"
          docker build -f docker/open-cowork-cloud/Dockerfile \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${version}" \
            -t "${staging_tag}" \
            .
          push_output="$(docker push "${staging_tag}")"
          printf '%s\n' "$push_output"
          digest="$(printf '%s\n' "$push_output" | awk '/digest: sha256:/ { for (i = 1; i <= NF; i += 1) if ($i == "digest:") print $(i + 1) }' | tail -1)"
          if [ -z "$digest" ]; then
            digest="$(docker buildx imagetools inspect "${staging_tag}" --format '{{.Manifest.Digest}}')"
          fi
          test -n "$digest"
          mkdir -p dist-oci
          cat > dist-oci/open-cowork-cloud.image.json <<EOF
          {
            "image": "${image}",
            "tag": "${image}:${GITHUB_REF_NAME}",
            "versionTag": "${image}:${version}",
            "stagingTag": "${staging_tag}",
            "digest": "${digest}",
            "digestRef": "${image}@${digest}",
            "source": "https://github.com/${GITHUB_REPOSITORY}",
            "revision": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}"
          }
          EOF
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "digest_ref=${image}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Build and publish gateway OCI staging image
        id: gateway-meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          short_sha="${GITHUB_SHA::12}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/open-cowork-gateway"
          staging_tag="${image}:release-candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${short_sha}"
          docker build -f docker/open-cowork-gateway/Dockerfile \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${version}" \
            -t "${staging_tag}" \
            .
          push_output="$(docker push "${staging_tag}")"
          printf '%s\n' "$push_output"
          digest="$(printf '%s\n' "$push_output" | awk '/digest: sha256:/ { for (i = 1; i <= NF; i += 1) if ($i == "digest:") print $(i + 1) }' | tail -1)"
          if [ -z "$digest" ]; then
            digest="$(docker buildx imagetools inspect "${staging_tag}" --format '{{.Manifest.Digest}}')"
          fi
          test -n "$digest"
          mkdir -p dist-oci
          cat > dist-oci/open-cowork-gateway.image.json <<EOF
          {
            "image": "${image}",
            "tag": "${image}:${GITHUB_REF_NAME}",
            "versionTag": "${image}:${version}",
            "stagingTag": "${staging_tag}",
            "digest": "${digest}",
            "digestRef": "${image}@${digest}",
            "source": "https://github.com/${GITHUB_REPOSITORY}",
            "revision": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}"
          }
          EOF
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "digest_ref=${image}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Generate cloud image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.cloud-meta.outputs.digest_ref }}
          format: cyclonedx-json
          output-file: dist-oci/open-cowork-cloud.image.sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate gateway image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.gateway-meta.outputs.digest_ref }}
          format: cyclonedx-json
          output-file: dist-oci/open-cowork-gateway.image.sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Scan cloud image vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.cloud-meta.outputs.digest_ref }}
          fail-build: true
          severity-cutoff: high
          output-format: json
          output-file: dist-oci/open-cowork-cloud.image.scan.grype.json

      - name: Scan gateway image vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.gateway-meta.outputs.digest_ref }}
          fail-build: true
          severity-cutoff: high
          output-format: json
          output-file: dist-oci/open-cowork-gateway.image.scan.grype.json

      - name: Sign OCI image digests
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${{ steps.cloud-meta.outputs.digest_ref }}"
          cosign sign --yes "${{ steps.gateway-meta.outputs.digest_ref }}"
          identity="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}$"
          cosign verify "${{ steps.cloud-meta.outputs.digest_ref }}" \
            --certificate-identity-regexp "$identity" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            > dist-oci/open-cowork-cloud.image.cosign-verify.json
          cosign verify "${{ steps.gateway-meta.outputs.digest_ref }}" \
            --certificate-identity-regexp "$identity" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            > dist-oci/open-cowork-gateway.image.cosign-verify.json

      - name: Attest cloud image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.cloud-meta.outputs.image }}
          subject-digest: ${{ steps.cloud-meta.outputs.digest }}
          push-to-registry: true

      - name: Attest gateway image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.gateway-meta.outputs.image }}
          subject-digest: ${{ steps.gateway-meta.outputs.digest }}
          push-to-registry: true

      - name: Attest cloud image SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.cloud-meta.outputs.image }}
          subject-digest: ${{ steps.cloud-meta.outputs.digest }}
          sbom-path: dist-oci/open-cowork-cloud.image.sbom.cdx.json
          push-to-registry: true

      - name: Attest gateway image SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.gateway-meta.outputs.image }}
          subject-digest: ${{ steps.gateway-meta.outputs.digest }}
          sbom-path: dist-oci/open-cowork-gateway.image.sbom.cdx.json
          push-to-registry: true

      - name: Verify OCI supply-chain evidence
        run: |
          docker buildx imagetools inspect "${{ steps.cloud-meta.outputs.digest_ref }}" > /dev/null
          docker buildx imagetools inspect "${{ steps.gateway-meta.outputs.digest_ref }}" > /dev/null
          jq empty dist-oci/open-cowork-cloud.image.json
          jq empty dist-oci/open-cowork-gateway.image.json
          jq empty dist-oci/open-cowork-cloud.image.sbom.cdx.json
          jq empty dist-oci/open-cowork-gateway.image.sbom.cdx.json
          jq empty dist-oci/open-cowork-cloud.image.scan.grype.json
          jq empty dist-oci/open-cowork-gateway.image.scan.grype.json
          jq empty dist-oci/open-cowork-cloud.image.cosign-verify.json
          jq empty dist-oci/open-cowork-gateway.image.cosign-verify.json

      - name: Upload OCI supply-chain artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-oci-supply-chain
          if-no-files-found: error
          retention-days: 14
          path: dist-oci/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v') && needs.release-policy.result == 'success'
    needs:
      - build-macos
      - build-linux
      - release-policy
      - publish-oci-images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release-publish
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Re-assert macOS signing policy before publishing
        run: |
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          signing_mode="${{ needs.build-macos.outputs.signing-mode }}"
          if [ "$signing_mode" = "signed" ]; then
            echo "Publishing signed macOS release artifacts."
            exit 0
          fi
          if [ "$major" = "0" ]; then
            echo "::warning::Publishing unsigned macOS preview artifacts for ${GITHUB_REF_NAME}."
            exit 0
          fi
          echo "::error::Refusing to publish unsigned macOS artifacts for ${GITHUB_REF_NAME}."
          exit 1

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist-artifacts

      - name: Generate checksums
        run: |
          cd dist-artifacts
          find . -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Verify OCI supply-chain release artifacts
        run: |
          test -d dist-artifacts/release-oci-supply-chain
          for component in open-cowork-cloud open-cowork-gateway; do
            test -s "dist-artifacts/release-oci-supply-chain/${component}.image.json"
            test -s "dist-artifacts/release-oci-supply-chain/${component}.image.sbom.cdx.json"
            test -s "dist-artifacts/release-oci-supply-chain/${component}.image.scan.grype.json"
            test -s "dist-artifacts/release-oci-supply-chain/${component}.image.cosign-verify.json"
            jq empty "dist-artifacts/release-oci-supply-chain/${component}.image.json"
            jq empty "dist-artifacts/release-oci-supply-chain/${component}.image.sbom.cdx.json"
            jq empty "dist-artifacts/release-oci-supply-chain/${component}.image.scan.grype.json"
            jq empty "dist-artifacts/release-oci-supply-chain/${component}.image.cosign-verify.json"
          done

      # SBOMs are enterprise table stakes for supply-chain review. We
      # check out the source at the tag, then generate both CycloneDX
      # and SPDX flavors so downstream consumers can use whichever
      # their scanner prefers. Generation runs against the source
      # manifests (package.json / pnpm-lock), not the packaged binaries
      # — the package set is identical across macOS and Linux, so one
      # SBOM per format covers both artifacts.
      - name: Checkout source for SBOM generation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: source

      - name: Extract changelog release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            BEGIN { capture = 0; found = 0 }
            $0 ~ "^## \\[" version "\\]( - [0-9]{4}-[0-9]{2}-[0-9]{2})?$" {
              capture = 1
              found = 1
              print
              next
            }
            capture && /^## \[/ { exit }
            capture { print }
            END { if (!found) exit 1 }
          ' source/CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Include third-party notices
        run: |
          cp source/THIRD_PARTY_NOTICES.md dist-artifacts/THIRD_PARTY_NOTICES.md
          tar -czf dist-artifacts/THIRD_PARTY_LICENSES.tar.gz -C source THIRD_PARTY_LICENSES

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: source
          format: cyclonedx-json
          output-file: dist-artifacts/sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: source
          format: spdx-json
          output-file: dist-artifacts/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Validate SBOMs
        run: |
          test -s dist-artifacts/sbom.cdx.json
          test -s dist-artifacts/sbom.spdx.json
          jq empty dist-artifacts/sbom.cdx.json
          jq empty dist-artifacts/sbom.spdx.json

      # Regenerate checksums so the SBOMs are covered by SHA256SUMS.txt
      # for tamper-evidence — the first checksum run above didn't see
      # them because they hadn't been generated yet.
      - name: Re-generate checksums with SBOMs included
        run: |
          cd dist-artifacts
          find . -type f ! -name 'SHA256SUMS.txt' ! -name 'SHA256SUMS.txt.asc' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Sign checksums
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.OPEN_COWORK_RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.OPEN_COWORK_RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "$RELEASE_GPG_PRIVATE_KEY" ]; then
            echo "No release GPG key configured; skipping detached checksum signature for ${GITHUB_REF_NAME}."
            exit 0
          fi
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          if [ -n "$RELEASE_GPG_PASSPHRASE" ]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE" --armor --detach-sign --output dist-artifacts/SHA256SUMS.txt.asc dist-artifacts/SHA256SUMS.txt
          else
            gpg --batch --yes --armor --detach-sign --output dist-artifacts/SHA256SUMS.txt.asc dist-artifacts/SHA256SUMS.txt
          fi
          test -s dist-artifacts/SHA256SUMS.txt.asc

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.zip
            dist-artifacts/**/*.AppImage
            dist-artifacts/**/*.deb
            dist-artifacts/**/*.blockmap
            dist-artifacts/SHA256SUMS.txt
            dist-artifacts/THIRD_PARTY_NOTICES.md
            dist-artifacts/THIRD_PARTY_LICENSES.tar.gz
            dist-artifacts/sbom.cdx.json
            dist-artifacts/sbom.spdx.json
            dist-artifacts/release-oci-supply-chain/*

      - name: Attest detached checksum signature
        if: hashFiles('dist-artifacts/SHA256SUMS.txt.asc') != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist-artifacts/SHA256SUMS.txt.asc

      - name: Attest signed macOS update feed metadata
        if: needs.build-macos.outputs.signing-mode == 'signed'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist-artifacts/release-macos/latest-mac.yml

      - name: Log in to GHCR for final OCI tag promotion
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Publish final OCI release tags
        run: |
          for component in open-cowork-cloud open-cowork-gateway; do
            image_json="dist-artifacts/release-oci-supply-chain/${component}.image.json"
            image="$(jq -er '.image' "$image_json")"
            tag="$(jq -er '.tag' "$image_json")"
            version_tag="$(jq -er '.versionTag' "$image_json")"
            digest="$(jq -er '.digest' "$image_json")"
            digest_ref="$(jq -er '.digestRef' "$image_json")"
            test -n "$image"
            test -n "$tag"
            test -n "$version_tag"
            test -n "$digest"
            test -n "$digest_ref"
            docker buildx imagetools create --prefer-index=false \
              -t "$tag" \
              -t "$version_tag" \
              "$digest_ref"
            tag_digest="$(docker buildx imagetools inspect "$tag" --format '{{.Manifest.Digest}}')"
            version_tag_digest="$(docker buildx imagetools inspect "$version_tag" --format '{{.Manifest.Digest}}')"
            test "$tag_digest" = "$digest"
            test "$version_tag_digest" = "$digest"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release-notes.md
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          files: |
            dist-artifacts/release-macos/*
            dist-artifacts/release-linux/*
            dist-artifacts/SHA256SUMS.txt
            dist-artifacts/SHA256SUMS.txt.asc
            dist-artifacts/THIRD_PARTY_NOTICES.md
            dist-artifacts/THIRD_PARTY_LICENSES.tar.gz
            dist-artifacts/sbom.cdx.json
            dist-artifacts/sbom.spdx.json
            dist-artifacts/release-oci-supply-chain/*
