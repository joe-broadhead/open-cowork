appId: com.cowork.desktop
productName: Cowork
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
  - runtime-config/**/*
extraResources:
  - from: ../../mcps
    to: mcps
    filter:
      - "*/dist/**/*"
      - "*/package.json"
      - "*/node_modules/**/*"
  - from: ../../.opencode/skills
    to: skills

mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  darkModeSupport: true

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Office

dmg:
  artifactName: Cowork-${version}-${arch}.${ext}

appImage:
  artifactName: Cowork-${version}-${arch}.${ext}

deb:
  artifactName: Cowork-${version}-${arch}.${ext}
