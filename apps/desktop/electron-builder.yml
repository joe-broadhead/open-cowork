# Auto-updates are INTENTIONALLY not configured here. Users download a
# new release from the GitHub Releases page when they want to update.
# Downstream distributions that want auto-update can add a `publish:`
# section pointing at their own feed (GitHub, S3, generic HTTP), wire
# up code signing / notarization certificates, and flip the feed on.
# The upstream project ships unsigned builds and keeps the update flow
# manual so there's no implicit trust relationship between this repo
# and downstream installs.

# Brand identity is env-driven so downstream forks can rebrand the
# packaged app without editing this file. Defaults are set in the
# `dist:*` scripts (apps/desktop/package.json) — when `APP_PRODUCT_NAME`
# and friends are set in the environment they override the upstream
# values at build time. See docs/downstream.md for the full recipe.
appId: ${env.APP_ID}
productName: ${env.APP_PRODUCT_NAME}
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  - from: runtime-config/AGENTS.md
    to: runtime-config/AGENTS.md
  - from: ../../open-cowork.config.json
    to: open-cowork.config.json
  - from: ../../open-cowork.config.schema.json
    to: open-cowork.config.schema.json
  - from: ../../skills
    to: skills
    filter:
      - "**/*"
  - from: ../../mcps/charts
    to: mcps/charts
    filter:
      - "dist/**/*"
      - "package.json"
  - from: ../../mcps/skills
    to: mcps/skills
    filter:
      - "dist/**/*"
      - "package.json"

asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/opencode-ai/**/*"
  - "node_modules/.pnpm/opencode-ai@*/node_modules/opencode-ai/**/*"
  - "node_modules/.pnpm/opencode-*/node_modules/opencode-*/**/*"

mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Office

dmg:
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}.${ext}

appImage:
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}.${ext}

deb:
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}.${ext}
