appId: com.opencowork.desktop
productName: Open Cowork
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  - from: runtime-config/AGENTS.md
    to: runtime-config/AGENTS.md
  - from: ../../open-cowork.config.json
    to: open-cowork.config.json
  - from: ../../open-cowork.config.schema.json
    to: open-cowork.config.schema.json
  - from: ../../skills
    to: skills
    filter:
      - "**/*"
  - from: ../../mcps/charts
    to: mcps/charts
    filter:
      - "dist/**/*"
      - "package.json"
  - from: ../../mcps/skills
    to: mcps/skills
    filter:
      - "dist/**/*"
      - "package.json"

asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/opencode-ai/**/*"
  - "node_modules/.pnpm/opencode-ai@*/node_modules/opencode-ai/**/*"
  - "node_modules/.pnpm/opencode-*/node_modules/opencode-*/**/*"

mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Office

dmg:
  artifactName: Open-Cowork-${version}-${arch}.${ext}

appImage:
  artifactName: Open-Cowork-${version}-${arch}.${ext}

deb:
  artifactName: Open-Cowork-${version}-${arch}.${ext}
