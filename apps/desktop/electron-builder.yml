# No static `publish:` feed is baked into the packaged app. The update
# feed is resolved at runtime from `updates.releaseSource` in the app
# config (see apps/desktop/src/main/update/update-release-source.ts), so
# a downstream fork points auto-update at its own infra through config
# alone — no rebuild of this file. electron-builder still emits the
# electron-updater feed metadata (`latest-mac.yml`, `latest.yml`,
# `*.blockmap`) for every signed target so the runtime updater can
# verify and apply updates. Signature verification is inherent: macOS
# in-app installs are gated on notarized/hardened-runtime builds, and
# Windows NSIS updates are verified against the code-signing publisher
# plus the sha512 in `latest.yml`. Public GitHub Releases are expected
# to be signed/notarized (macOS) and Authenticode-signed (Windows);
# unsigned preview builds stay as workflow artifacts or local outputs
# and intentionally omit the signed update feed metadata.

# Brand identity is template-driven so downstream forks can rebrand the
# packaged app without editing this file. The `dist:*` scripts resolve
# the placeholders below into a generated builder config before invoking
# electron-builder, which keeps productName/appId/artifact names concrete
# across every builder code path. See docs/downstream.md for the full recipe.
appId: ${env.APP_ID}
productName: ${env.APP_PRODUCT_NAME}
directories:
  output: release
  buildResources: resources
afterPack: ../../scripts/desktop-after-pack.mjs
files:
  - dist/**/*
  - package.json
extraResources:
  - from: runtime-config/AGENTS.md
    to: runtime-config/AGENTS.md
  - from: ../../open-cowork.config.json
    to: open-cowork.config.json
  - from: ../../open-cowork.config.schema.json
    to: open-cowork.config.schema.json
  - from: ../../branding
    to: branding
    filter:
      - "**/*.svg"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.webp"
      - "**/*.gif"
  - from: ../../THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  - from: ../../THIRD_PARTY_LICENSES
    to: THIRD_PARTY_LICENSES
    filter:
      - "**/*"
  - from: ../../skills
    to: skills
    filter:
      - "**/*"
  - from: ../../mcps/charts
    to: mcps/charts
    filter:
      - "dist/**/*"
      - "package.json"
  - from: ../../mcps/clock
    to: mcps/clock
    filter:
      - "dist/**/*"
      - "package.json"
  - from: ../../mcps/agents
    to: mcps/agents
    filter:
      - "dist/**/*"
      - "package.json"
  - from: ../../mcps/skills
    to: mcps/skills
    filter:
      - "dist/**/*"
      - "package.json"
  - from: ../../mcps/workflows
    to: mcps/workflows
    filter:
      - "dist/**/*"
      - "package.json"

asar: true
asarUnpack:
  - "node_modules/opencode-ai/**/*"
  - "node_modules/.pnpm/opencode-ai@*/node_modules/opencode-ai/**/*"
  - "node_modules/.pnpm/opencode-*/node_modules/opencode-*/**/*"

# Electron fuses harden the packaged binary (audit issue #873). electron-builder
# applies these via @electron/fuses immediately before code signing, so the
# final signature always covers the patched binary.
electronFuses:
  # MUST stay enabled: packages/runtime-host/src/runtime-mcp.ts spawns the
  # bundled MCP servers via process.execPath with ELECTRON_RUN_AS_NODE=1.
  # Disabling this fuse would break every packaged MCP server. Set explicitly
  # so a future Electron default flip cannot silently break them either.
  runAsNode: true
  # Ignore --inspect/--inspect-brk (and the SIGUSR1 inspector) so a local
  # attacker cannot attach a debugger to the privileged main process.
  enableNodeCliInspectArguments: false
  # Only boot the app from app.asar, never from an unpacked app directory an
  # attacker could drop next to it. The asarUnpack'ed opencode-ai binaries are
  # spawned as child processes, not loaded as the app, so they are unaffected.
  onlyLoadAppFromAsar: true
  # Validate the app.asar header hash at startup. electron-builder embeds
  # ElectronAsarIntegrity into Info.plist for macOS builds automatically; on
  # Linux, Electron does not implement the check, so the fuse is inert there.
  # Files shipped via asarUnpack/extraResources sit outside the asar and are
  # not covered by this check (they are covered by macOS code signing).
  enableEmbeddedAsarIntegrityValidation: true
  # Re-apply an ad-hoc signature after patching the binary so unsigned preview
  # builds still launch on macOS (arm64 refuses unsigned binaries). Signed
  # release builds replace this with the real signature right afterwards.
  resetAdHocDarwinSignature: true

mac:
  icon: ${env.APP_ICON_MAC}
  category: public.app-category.productivity
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}-mac.${ext}
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true

linux:
  icon: ${env.APP_ICON_LINUX}
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Office
  # Debian packaging requires a maintainer address. We put it here
  # (rather than in `author` on package.json) so the field stays
  # scoped to the Linux packaging concern and downstream forks can
  # override it via their own electron-builder config.
  maintainer: ${env.APP_MAINTAINER}

win:
  icon: ${env.APP_ICON_WIN}
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}-setup.${ext}
  target:
    - target: nsis
      arch:
        - x64
  # electron-builder Authenticode-signs the installer and app during
  # packaging when a certificate is provided via WIN_CSC_LINK /
  # WIN_CSC_KEY_PASSWORD. Signing during (not after) packaging is what
  # keeps the sha512 in latest.yml matching the shipped, signed binary
  # so electron-updater can verify it. When the cert secrets are absent
  # electron-builder emits an unsigned installer instead of failing, so
  # PR/preview CI still produces an artifact. Public v1.0+ Windows
  # releases must provide the cert secrets. See docs for the SignPath
  # Foundation (free-for-OSS) post-build alternative and the required
  # `latest.yml` regeneration step it needs.
  signtoolOptions:
    signingHashAlgorithms:
      - sha256

nsis:
  # A normal wizard installer (not one-click) so users can pick the
  # install location and so per-user installs work without elevation.
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  # Emit the *.blockmap alongside the installer so electron-updater can
  # do differential (delta) downloads; a stale/missing blockmap falls
  # back to a verified full download.
  differentialPackage: true
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}-setup.${ext}

dmg:
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}.${ext}

appImage:
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}.${ext}

deb:
  artifactName: ${env.APP_ARTIFACT_PREFIX}-${version}-${arch}.${ext}
