<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Cowork</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, rgba(188, 151, 255, 0.14), transparent 36%), #1b1b26;
        color: #ece8ff;
      }

      .shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .badge {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(203, 177, 255, 0.24);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
        font-size: 34px;
        font-weight: 700;
        color: #d8bcff;
      }

      .title {
        font-size: 28px;
        font-weight: 600;
      }

      .subtitle {
        font-size: 14px;
        color: rgba(236, 232, 255, 0.72);
      }
    </style>
  </head>
  <body>
    <div class="shell" aria-label="Open Cowork is starting">
      <div class="badge">O</div>
      <div class="title">Open Cowork</div>
      <div class="subtitle">Starting runtime and loading workspace...</div>
    </div>
  </body>
</html>
