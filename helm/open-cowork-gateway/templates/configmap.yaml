apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "open-cowork-gateway.fullname" . }}-config
  labels:
    {{- include "open-cowork-gateway.labels" . | nindent 4 }}
data:
  OPEN_COWORK_CONFIG_PATH: {{ .Values.gateway.configPath | quote }}
  OPEN_COWORK_CONFIG_DIR: {{ .Values.gateway.configDir | quote }}
  OPEN_COWORK_DOWNSTREAM_ROOT: {{ .Values.gateway.downstreamRoot | quote }}
  OPEN_COWORK_CLOUD_BASE_URL: {{ .Values.gateway.cloudBaseUrl | quote }}
  OPEN_COWORK_GATEWAY_ALLOW_INSECURE_HTTP: {{ .Values.gateway.allowInsecureHttp | quote }}
  OPEN_COWORK_GATEWAY_HOST: {{ .Values.gateway.host | quote }}
  OPEN_COWORK_GATEWAY_PORT: {{ .Values.gateway.port | quote }}
  OPEN_COWORK_GATEWAY_PUBLIC_URL: {{ .Values.gateway.publicUrl | quote }}
  OPEN_COWORK_GATEWAY_MODE: {{ .Values.gateway.mode | quote }}
  OPEN_COWORK_GATEWAY_LOG_LEVEL: {{ .Values.gateway.logLevel | quote }}
  OPEN_COWORK_GATEWAY_PUBLIC_BRANDING_JSON: {{ .Values.gateway.branding | toJson | quote }}
  OPEN_COWORK_GATEWAY_METRICS_ENABLED: {{ .Values.gateway.metrics.enabled | quote }}
  OPEN_COWORK_GATEWAY_DIAGNOSTICS_ENABLED: {{ .Values.gateway.diagnostics.enabled | quote }}
  OPEN_COWORK_GATEWAY_TELEGRAM_CHANNEL_BINDING_ID: {{ .Values.gateway.telegram.channelBindingId | quote }}
  OPEN_COWORK_GATEWAY_TELEGRAM_MODE: {{ .Values.gateway.telegram.mode | quote }}
  OPEN_COWORK_GATEWAY_TELEGRAM_PUBLIC_URL: {{ .Values.gateway.telegram.publicUrl | quote }}
  OPEN_COWORK_GATEWAY_SLACK_CHANNEL_BINDING_ID: {{ .Values.gateway.slack.channelBindingId | quote }}
  OPEN_COWORK_GATEWAY_SLACK_TEAM_ID: {{ .Values.gateway.slack.teamId | quote }}
  OPEN_COWORK_GATEWAY_SLACK_DEFAULT_CHANNEL_ID: {{ .Values.gateway.slack.defaultChannelId | quote }}
  OPEN_COWORK_GATEWAY_SLACK_API_BASE_URL: {{ .Values.gateway.slack.apiBaseUrl | quote }}
  OPEN_COWORK_GATEWAY_EMAIL_CHANNEL_BINDING_ID: {{ .Values.gateway.email.channelBindingId | quote }}
  OPEN_COWORK_GATEWAY_EMAIL_FROM: {{ .Values.gateway.email.from | quote }}
  OPEN_COWORK_GATEWAY_EMAIL_ADDRESS: {{ .Values.gateway.email.address | quote }}
  OPEN_COWORK_GATEWAY_EMAIL_DOMAIN: {{ .Values.gateway.email.domain | quote }}
  OPEN_COWORK_GATEWAY_EMAIL_SMTP_HOST: {{ .Values.gateway.email.smtpHost | quote }}
  OPEN_COWORK_GATEWAY_EMAIL_SMTP_PORT: {{ .Values.gateway.email.smtpPort | quote }}
  OPEN_COWORK_GATEWAY_EMAIL_SMTP_SECURE: {{ .Values.gateway.email.smtpSecure | quote }}
  OPEN_COWORK_GATEWAY_EMAIL_SMTP_USERNAME: {{ .Values.gateway.email.smtpUsername | quote }}
  OPEN_COWORK_GATEWAY_WEBHOOK_DELIVERY_URL: {{ .Values.gateway.webhook.deliveryUrl | quote }}
  OPEN_COWORK_GATEWAY_WEBHOOK_CHANNEL_BINDING_ID: {{ .Values.gateway.webhook.channelBindingId | quote }}
