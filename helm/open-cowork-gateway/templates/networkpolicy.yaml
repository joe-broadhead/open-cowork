{{- $egress := default dict .Values.networkPolicy.egress }}
{{- $egressAllow := default (list) $egress.allow }}
{{- $egressTo := default (list) $egress.to }}
{{- $publicGateway := or .Values.ingress.enabled (eq .Values.service.type "LoadBalancer") (eq .Values.service.type "NodePort") .Values.gateway.publicUrl .Values.gateway.telegram.publicUrl }}
{{- $egressEnabled := or $egress.enabled $publicGateway }}
{{- if .Values.networkPolicy.enabled }}
{{- range $index, $entry := $egressAllow }}
{{- if empty $entry.to }}
{{- fail (printf "networkPolicy.egress.allow[%d].to is required; use explicit peers for each egress allowlist entry." $index) }}
{{- end }}
{{- if empty $entry.ports }}
{{- fail (printf "networkPolicy.egress.allow[%d].ports is required; use explicit ports for each egress allowlist entry." $index) }}
{{- end }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "open-cowork-gateway.fullname" . }}-default-deny
  labels:
    {{- include "open-cowork-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "open-cowork-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if $egressEnabled }}
    - Egress
    {{- end }}
  {{- if $egressEnabled }}
  {{- if or $egressAllow $egressTo }}
  egress:
    {{- range $entry := $egressAllow }}
    - to:
        {{- toYaml $entry.to | nindent 8 }}
      ports:
        {{- toYaml $entry.ports | nindent 8 }}
    {{- end }}
    {{- if $egressTo }}
    - to:
        {{- toYaml $egressTo | nindent 8 }}
    {{- end }}
  {{- else }}
  egress: []
  {{- end }}
  {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "open-cowork-gateway.fullname" . }}-ingress
  labels:
    {{- include "open-cowork-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "open-cowork-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.gateway.port }}
      {{- with .Values.networkPolicy.ingress.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
