{{- if and (not .Values.image.tag) (not .Values.image.digest) }}
{{- fail "image.tag or image.digest is required; pin a release tag or immutable digest instead of relying on latest." }}
{{- end }}
{{- if ne .Values.gateway.productMode "cloud_channel" }}
{{- fail "open-cowork-gateway Helm chart only deploys Cloud Channel Gateway. Use the standalone gateway chart/app for gateway.productMode=standalone." }}
{{- end }}
{{- if eq .Values.image.tag "latest" }}
{{- fail "image.tag=latest is not allowed; pin a release tag or immutable digest for reproducible deployments." }}
{{- end }}
{{- if and (gt (int .Values.replicaCount) 1) (not .Values.gateway.experimentalDistributedOwnership) }}
{{- fail "gateway replicaCount > 1 is unsafe while stream/replay state is process-local; run one replica per channel-binding shard or set gateway.experimentalDistributedOwnership=true for explicit experimental deployments." }}
{{- end }}
{{- $sharedConfig := or .Values.gateway.configPath .Values.gateway.configDir .Values.gateway.downstreamRoot }}
{{- if and (not $sharedConfig) (not .Values.gateway.cloudBaseUrl) }}
{{- fail "gateway.cloudBaseUrl is required." }}
{{- end }}
{{- if and (not $sharedConfig) (not .Values.gateway.serviceToken) (not .Values.gateway.existingSecret) }}
{{- fail "gateway.serviceToken or gateway.existingSecret is required." }}
{{- end }}
{{- if and (not $sharedConfig) (not .Values.gateway.providersJson) (not .Values.gateway.telegram.botToken) (not .Values.gateway.slack.botToken) (not .Values.gateway.email.inboundSecret) (not .Values.gateway.webhook.deliveryUrl) (not .Values.gateway.existingSecret) }}
{{- fail "gateway.providersJson, gateway.telegram.botToken, gateway.slack.botToken, gateway.email.inboundSecret, gateway.webhook.deliveryUrl, or gateway.existingSecret is required to configure at least one gateway provider." }}
{{- end }}
{{- if and .Values.ingress.enabled (not .Values.gateway.publicUrl) }}
{{- fail "gateway.publicUrl is required when gateway ingress is enabled." }}
{{- end }}
{{- if and .Values.gateway.publicUrl (not (hasPrefix "https://" .Values.gateway.publicUrl)) }}
{{- fail "gateway.publicUrl must use HTTPS for public or proxied Gateway deployments." }}
{{- end }}
{{- if and .Values.gateway.publicUrl (or (contains "localhost" .Values.gateway.publicUrl) (contains "127.0.0.1" .Values.gateway.publicUrl) (contains "[::1]" .Values.gateway.publicUrl)) }}
{{- fail "gateway.publicUrl must be publicly reachable and cannot be loopback." }}
{{- end }}
{{- if and (or .Values.ingress.enabled (eq .Values.service.type "LoadBalancer") (eq .Values.service.type "NodePort")) .Values.gateway.allowLoopbackOperatorBypass }}
{{- fail "gateway.allowLoopbackOperatorBypass=true is not allowed with ingress, LoadBalancer, or NodePort exposure." }}
{{- end }}
{{- if and (not $sharedConfig) (not .Values.gateway.adminToken) (not .Values.gateway.existingSecret) (not .Values.gateway.allowLoopbackOperatorBypass) }}
{{- fail "gateway.adminToken or gateway.existingSecret is required for gateway operator endpoints; gateway.allowLoopbackOperatorBypass=true is local loopback-only." }}
{{- end }}
{{- if and .Values.gateway.adminToken (or (hasPrefix "replace-with" .Values.gateway.adminToken) (hasPrefix "change-me" .Values.gateway.adminToken) (hasPrefix "example-" .Values.gateway.adminToken) (hasPrefix "demo-" .Values.gateway.adminToken)) }}
{{- fail "gateway.adminToken is a placeholder; use a generated operator token or gateway.existingSecret." }}
{{- end }}
{{- if and .Values.gateway.allowLoopbackOperatorBypass (ne .Values.gateway.host "127.0.0.1") (ne .Values.gateway.host "localhost") }}
{{- fail "gateway.allowLoopbackOperatorBypass=true requires gateway.host=127.0.0.1 or localhost." }}
{{- end }}
{{- if and .Values.gateway.serviceToken (or (hasPrefix "replace-with" .Values.gateway.serviceToken) (hasPrefix "change-me" .Values.gateway.serviceToken) (hasPrefix "example-" .Values.gateway.serviceToken) (hasPrefix "demo-" .Values.gateway.serviceToken)) }}
{{- fail "gateway.serviceToken is a placeholder; use a generated gateway-scoped token or gateway.existingSecret." }}
{{- end }}
{{- if and .Values.gateway.webhook.deliveryUrl (not .Values.gateway.webhook.sharedSecret) (not .Values.gateway.existingSecret) }}
{{- fail "gateway.webhook.sharedSecret or gateway.existingSecret is required when the generic webhook provider is enabled." }}
{{- end }}
{{- if and .Values.gateway.webhook.sharedSecret (or (hasPrefix "replace-with" .Values.gateway.webhook.sharedSecret) (hasPrefix "change-me" .Values.gateway.webhook.sharedSecret) (hasPrefix "example-" .Values.gateway.webhook.sharedSecret) (hasPrefix "demo-" .Values.gateway.webhook.sharedSecret)) }}
{{- fail "gateway.webhook.sharedSecret is a placeholder; use a generated shared secret or gateway.existingSecret." }}
{{- end }}
{{- if and (eq .Values.gateway.telegram.mode "webhook") (not .Values.gateway.telegram.webhookSecret) (not .Values.gateway.existingSecret) }}
{{- fail "gateway.telegram.webhookSecret or gateway.existingSecret is required when Telegram webhook mode is enabled." }}
{{- end }}
{{- if and .Values.gateway.telegram.webhookSecret (or (hasPrefix "replace-with" .Values.gateway.telegram.webhookSecret) (hasPrefix "change-me" .Values.gateway.telegram.webhookSecret) (hasPrefix "example-" .Values.gateway.telegram.webhookSecret) (hasPrefix "demo-" .Values.gateway.telegram.webhookSecret)) }}
{{- fail "gateway.telegram.webhookSecret is a placeholder; use a generated webhook secret or gateway.existingSecret." }}
{{- end }}
{{- if and (eq .Values.gateway.telegram.mode "webhook") (not .Values.gateway.telegram.publicUrl) (not .Values.gateway.publicUrl) }}
{{- fail "gateway.telegram.publicUrl or gateway.publicUrl is required when Telegram webhook mode is enabled." }}
{{- end }}
{{- if and .Values.gateway.telegram.publicUrl (not (hasPrefix "https://" .Values.gateway.telegram.publicUrl)) }}
{{- fail "gateway.telegram.publicUrl must use HTTPS when Telegram webhook mode is enabled." }}
{{- end }}
{{- if and .Values.gateway.slack.botToken (not .Values.gateway.slack.signingSecret) (not .Values.gateway.existingSecret) }}
{{- fail "gateway.slack.signingSecret or gateway.existingSecret is required when the Slack provider is enabled." }}
{{- end }}
{{- if and .Values.gateway.slack.signingSecret (or (hasPrefix "replace-with" .Values.gateway.slack.signingSecret) (hasPrefix "change-me" .Values.gateway.slack.signingSecret) (hasPrefix "example-" .Values.gateway.slack.signingSecret) (hasPrefix "demo-" .Values.gateway.slack.signingSecret)) }}
{{- fail "gateway.slack.signingSecret is a placeholder; use a generated signing secret or gateway.existingSecret." }}
{{- end }}
{{- if and .Values.gateway.email.inboundSecret (or (not .Values.gateway.email.from) (not .Values.gateway.email.smtpHost)) (not .Values.gateway.existingSecret) }}
{{- fail "gateway.email.from and gateway.email.smtpHost are required when the email provider is enabled." }}
{{- end }}
{{- if and .Values.gateway.email.inboundSecret (or (hasPrefix "replace-with" .Values.gateway.email.inboundSecret) (hasPrefix "change-me" .Values.gateway.email.inboundSecret) (hasPrefix "example-" .Values.gateway.email.inboundSecret) (hasPrefix "demo-" .Values.gateway.email.inboundSecret)) }}
{{- fail "gateway.email.inboundSecret is a placeholder; use a generated inbound secret or gateway.existingSecret." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-cowork-gateway.fullname" . }}
  labels:
    {{- include "open-cowork-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "open-cowork-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "open-cowork-gateway.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: open-cowork-gateway
          image: "{{ include "open-cowork-gateway.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "open-cowork-gateway.fullname" . }}-config
            - secretRef:
                name: {{ include "open-cowork-gateway.secretName" . }}
          env:
            - name: OPEN_COWORK_GATEWAY_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
