image:
  repository: ghcr.io/joe-broadhead/open-cowork-gateway
  tag: "0.0.0"
  digest: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

gateway:
  productMode: cloud_channel
  mode: self-host
  configPath: ""
  configDir: ""
  downstreamRoot: ""
  cloudBaseUrl: ""
  allowInsecureHttp: false
  serviceToken: ""
  existingSecret: ""
  host: 0.0.0.0
  port: 8790
  publicUrl: ""
  adminToken: ""
  allowLoopbackOperatorBypass: false
  maxRequestBodyBytes: 1048576
  experimentalDistributedOwnership: false
  logLevel: info
  timeouts:
    cloudRequestMs: 30000
    webhookDeliveryMs: 15000
    smtpMs: 30000
    shutdownDrainMs: 10000
  branding:
    productName: Open Cowork Cloud
    shortName: OC
    logoUrl: ""
    supportUrl: ""
    privacyUrl: ""
    securityUrl: ""
    legalUrl: ""
    managedOrgConnectionLabels:
      desktopToken: Desktop token
      gatewayToken: Gateway token
      apiToken: API token
      cloudUrl: Cloud URL
  metrics:
    enabled: false
  diagnostics:
    enabled: false
  providersJson: ""
  telegram:
    botToken: ""
    channelBindingId: telegram
    mode: polling
    publicUrl: ""
    webhookSecret: ""
  slack:
    botToken: ""
    signingSecret: ""
    channelBindingId: slack
    teamId: ""
    defaultChannelId: ""
    apiBaseUrl: ""
  email:
    inboundSecret: ""
    channelBindingId: email
    maxAttachmentBytes: 1048576
    from: ""
    address: ""
    domain: ""
    smtpHost: ""
    smtpPort: "587"
    smtpSecure: "false"
    smtpUsername: ""
    smtpPassword: ""
  webhook:
    deliveryUrl: ""
    sharedSecret: ""
    channelBindingId: webhook
    maxAttachmentBytes: 1048576

replicaCount: 1

service:
  type: ClusterIP
  port: 80

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: true
  ingress:
    from: []
  egress:
    enabled: false
    to: []

serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: false

resources: {}

topologySpreadConstraints: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: open-cowork-gateway.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
