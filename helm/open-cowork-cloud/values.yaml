image:
  repository: ghcr.io/joe-broadhead/open-cowork-cloud
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

cloud:
  profile: full
  root: /data/open-cowork-cloud
  allowInsecureAuth: false
  allowInsecurePublicAuth: false
  auth:
    mode: none
    oidcIssuerUrl: ""
    oidcClientId: ""
    oidcClientSecretRef: ""
    oidcCallbackPath: /auth/callback
    allowedEmailDomains: []
  controlPlaneUrl: ""
  secretKey: ""
  secretKeyRef: ""
  cookieSecret: ""
  cookieSecretRef: ""
  internalToken: ""
  internalTokenRef: ""
  cookieSecure: true
  publicUrl: ""
  oidcClientSecret: ""
  existingSecret: ""
  observability:
    serviceName: open-cowork-cloud
    serviceVersion: ""
    logFormat: json
    otlpEndpoint: ""
    otlpHeaders: ""
  checkpoints:
    enabled: false
  objectStore:
    kind: filesystem
    bucket: ""
    region: ""
    endpoint: ""
    prefix: ""
    accessKeyId: ""
    secretAccessKey: ""
    bearerToken: ""
    sasToken: ""
    accountName: ""

roles:
  web:
    enabled: true
    replicas: 1
    port: 8787
    autoProcessCommands: false
    resources: {}
  worker:
    enabled: false
    replicas: 1
    pollMs: 1000
    checkpointsEnabled: true
    resources: {}
    persistence:
      enabled: false
      size: 20Gi
      storageClassName: ""
  scheduler:
    enabled: false
    replicas: 1
    pollMs: 1000
    resources: {}

service:
  type: ClusterIP
  port: 80

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: open-cowork-cloud.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
