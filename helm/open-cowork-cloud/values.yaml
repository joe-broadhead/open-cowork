image:
  repository: ghcr.io/joe-broadhead/open-cowork-cloud
  tag: "0.0.0"
  digest: ""
  pullPolicy: IfNotPresent

gateway:
  enabled: false
  image:
    repository: ghcr.io/joe-broadhead/open-cowork-channel-gateway
    tag: "0.0.0"
    digest: ""
    pullPolicy: IfNotPresent
  gateway:
    cloudBaseUrl: ""
    serviceToken: ""
    existingSecret: ""

nameOverride: ""
fullnameOverride: ""

cloud:
  deploymentTier: local
  profile: full
  configPath: ""
  configDir: ""
  downstreamRoot: ""
  root: /data/open-cowork-cloud
  shutdownGraceMs: 300000
  # Long-running roles must never own DDL in production. Run the pinned
  # cloud:migrate:start image as a separately credentialed one-shot job.
  runMigrations: false
  allowInsecureAuth: false
  allowInsecurePublicAuth: false
  auth:
    mode: none
    signupMode: ""
    allowSelfServiceSignup: false
    oidcIssuerUrl: ""
    oidcClientId: ""
    oidcClientSecretRef: ""
    oidcCallbackPath: /auth/callback
    allowedEmailDomains: []
    headerSecret: ""
    headerSecretRef: ""
    headerAllowUnsigned: false
    headerMaxSignatureAgeMs: 300000
    apiTokenDefaultTtlMs: 7776000000
    apiTokenMaxTtlMs: 31536000000
    apiTokenAllowedScopes:
      - desktop
      - gateway
      - admin
      - operator
  controlPlaneUrl: ""
  secretKey: ""
  secretKeyRef: ""
  cookieSecret: ""
  cookieSecretRef: ""
  internalToken: ""
  internalTokenRef: ""
  cookieSecure: true
  publicUrl: ""
  trustProxyHeaders: false
  trustedProxyCidrs: []
  branding:
    # The stock chart does not set a palette. Cloud Web inherits the shared
    # Desktop-aligned dark theme unless downstream values intentionally override it.
    productName: Open Cowork Cloud
    shortName: OC
    logoUrl: ""
    supportUrl: ""
    privacyUrl: ""
    securityUrl: ""
    legalUrl: ""
    dashboard:
      title: Workspace
      subtitle: Cloud control plane state for this signed-in org.
    managedOrgConnectionLabels:
      desktopToken: Desktop token
      gatewayToken: Gateway token
      apiToken: API token
      cloudUrl: Cloud URL
  oidcClientSecret: ""
  existingSecret: ""
  observability:
    serviceName: open-cowork-cloud
    serviceVersion: ""
    logFormat: json
    otlpEndpoint: ""
    otlpHeaders: ""
    otlpFlushIntervalMs: 30000
    otlpMaxQueueSize: 1000
  checkpoints:
    enabled: false
  objectStore:
    kind: filesystem
    bucket: ""
    region: ""
    endpoint: ""
    prefix: ""
    accessKeyId: ""
    secretAccessKey: ""
    bearerToken: ""
    sasToken: ""
    accountName: ""

cloudSqlProxy:
  enabled: false
  image:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    tag: "2.23.0"
    digest: ""
    pullPolicy: IfNotPresent
  instanceConnectionName: ""
  address: 127.0.0.1
  port: 5432
  privateIp: false
  autoIamAuthn: false
  structuredLogs: true
  runConnectionTest: false
  minSigtermDelay: ""
  maxSigtermDelay: ""
  healthCheck:
    port: 9090
    waitTimeout: 1s
    startupProbe:
      periodSeconds: 2
      timeoutSeconds: 2
      failureThreshold: 30
  resources: {}
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

roles:
  web:
    enabled: true
    replicas: 1
    port: 8787
    autoProcessCommands: false
    # preStop sleep (seconds) so the Service endpoint is removed before SIGTERM —
    # avoids dropped requests during rollouts. Must be < terminationGracePeriodSeconds.
    preStopDrainSeconds: 10
    startupProbe:
      enabled: true
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 30
    terminationGracePeriodSeconds: 60
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    resources: {}
    topologySpreadConstraints: []
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
      maxUnavailable: ""
  worker:
    enabled: false
    replicas: 1
    pollMs: 1000
    checkpointsEnabled: true
    # The app serves /livez on this port so a wedged-event-loop worker is restarted.
    livenessPort: 8788
    livenessProbe:
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 4
    terminationGracePeriodSeconds: 300
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    resources: {}
    topologySpreadConstraints: []
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
      maxUnavailable: ""
    persistence:
      enabled: false
      size: 20Gi
      storageClassName: ""
  scheduler:
    enabled: false
    replicas: 1
    pollMs: 1000
    livenessPort: 8788
    livenessProbe:
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 4
    terminationGracePeriodSeconds: 120
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    resources: {}
    topologySpreadConstraints: []
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
      maxUnavailable: ""

service:
  type: ClusterIP
  port: 80
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: true
  ingress:
    # Local/demo installs explicitly allow all sources to the web port so the
    # chart remains usable in throwaway namespaces. Set this to false in private
    # internal overlays, and public_production always ignores it and requires
    # explicit ingress.from peers.
    allowAllSourcesForLocalOnly: true
    # Production/public overlays must select ingress-controller or private
    # caller peers explicitly. Example:
    # from:
    #   - namespaceSelector:
    #       matchLabels:
    #         kubernetes.io/metadata.name: ingress-nginx
    #     podSelector:
    #       matchLabels:
    #         app.kubernetes.io/name: ingress-nginx
    from: []
  egress:
    # Local defaults stay ingress-isolated but outbound-unrestricted for simple
    # installs. public_production forces egress isolation even when this is
    # false, and an empty allowlist renders egress: [].
    enabled: false
    # Prefer typed entries so each approved dependency has explicit peers and
    # ports. Example:
    # allow:
    #   - name: object-store
    #     to:
    #       - ipBlock:
    #           cidr: 203.0.113.0/24
    #     ports:
    #       - protocol: TCP
    #         port: 443
    allow: []
    # Raw Kubernetes NetworkPolicy peers are kept for existing private overlays.
    to: []

serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: open-cowork-cloud.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
