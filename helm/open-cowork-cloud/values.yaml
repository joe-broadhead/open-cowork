image:
  repository: ghcr.io/joe-broadhead/open-cowork-cloud
  tag: "0.0.0"
  digest: ""
  pullPolicy: IfNotPresent

gateway:
  enabled: false
  image:
    repository: ghcr.io/joe-broadhead/open-cowork-gateway
    tag: "0.0.0"
    digest: ""
    pullPolicy: IfNotPresent
  gateway:
    cloudBaseUrl: ""
    serviceToken: ""
    existingSecret: ""

nameOverride: ""
fullnameOverride: ""

cloud:
  deploymentTier: local
  profile: full
  configPath: ""
  configDir: ""
  downstreamRoot: ""
  root: /data/open-cowork-cloud
  shutdownGraceMs: 300000
  allowInsecureAuth: false
  allowInsecurePublicAuth: false
  auth:
    mode: none
    signupMode: ""
    allowSelfServiceSignup: false
    oidcIssuerUrl: ""
    oidcClientId: ""
    oidcClientSecretRef: ""
    oidcCallbackPath: /auth/callback
    allowedEmailDomains: []
    headerSecret: ""
    headerSecretRef: ""
    headerAllowUnsigned: false
    headerMaxSignatureAgeMs: 300000
    apiTokenDefaultTtlMs: 7776000000
    apiTokenMaxTtlMs: 31536000000
    apiTokenAllowedScopes:
      - desktop
      - gateway
      - admin
      - operator
  controlPlaneUrl: ""
  secretKey: ""
  secretKeyRef: ""
  cookieSecret: ""
  cookieSecretRef: ""
  internalToken: ""
  internalTokenRef: ""
  cookieSecure: true
  publicUrl: ""
  trustProxyHeaders: false
  branding:
    productName: Open Cowork Cloud
    shortName: OC
    logoUrl: ""
    supportUrl: ""
    privacyUrl: ""
    securityUrl: ""
    legalUrl: ""
    theme:
      background: "#f5f6f3"
      surface: "#ffffff"
      mutedSurface: "#ecefed"
      border: "#d8ddd7"
      text: "#18211c"
      mutedText: "#66736b"
      accent: "#2d6b56"
      accentStrong: "#1f503f"
    dashboard:
      title: Workspace
      subtitle: Cloud control plane state for this signed-in org.
    managedOrgConnectionLabels:
      desktopToken: Desktop token
      gatewayToken: Gateway token
      apiToken: API token
      cloudUrl: Cloud URL
  oidcClientSecret: ""
  existingSecret: ""
  observability:
    serviceName: open-cowork-cloud
    serviceVersion: ""
    logFormat: json
    otlpEndpoint: ""
    otlpHeaders: ""
  checkpoints:
    enabled: false
  objectStore:
    kind: filesystem
    bucket: ""
    region: ""
    endpoint: ""
    prefix: ""
    accessKeyId: ""
    secretAccessKey: ""
    bearerToken: ""
    sasToken: ""
    accountName: ""

roles:
  web:
    enabled: true
    replicas: 1
    port: 8787
    autoProcessCommands: false
    terminationGracePeriodSeconds: 60
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    resources: {}
    topologySpreadConstraints: []
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
      maxUnavailable: ""
  worker:
    enabled: false
    replicas: 1
    pollMs: 1000
    checkpointsEnabled: true
    terminationGracePeriodSeconds: 300
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    resources: {}
    topologySpreadConstraints: []
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
      maxUnavailable: ""
    persistence:
      enabled: false
      size: 20Gi
      storageClassName: ""
  scheduler:
    enabled: false
    replicas: 1
    pollMs: 1000
    terminationGracePeriodSeconds: 120
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    resources: {}
    topologySpreadConstraints: []
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
      maxUnavailable: ""

service:
  type: ClusterIP
  port: 80
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: open-cowork-cloud.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
