{{- if and (not $.Values.image.tag) (not $.Values.image.digest) }}
{{- fail "image.tag or image.digest is required; pin a release tag or immutable digest instead of relying on latest." }}
{{- end }}
{{- if eq $.Values.image.tag "latest" }}
{{- fail "image.tag=latest is not allowed; pin a release tag or immutable digest for reproducible deployments." }}
{{- end }}
{{- $cloudSqlProxy := default dict $.Values.cloudSqlProxy }}
{{- $cloudSqlProxyImage := default dict $cloudSqlProxy.image }}
{{- $cloudSqlProxyHealthCheck := default dict $cloudSqlProxy.healthCheck }}
{{- $cloudSqlProxyStartupProbe := default dict $cloudSqlProxyHealthCheck.startupProbe }}
{{- $cloudSqlProxyHealthCheckPort := int (default 9090 $cloudSqlProxyHealthCheck.port) }}
{{- $cloudSqlProxyHealthCheckWaitTimeout := default "1s" $cloudSqlProxyHealthCheck.waitTimeout }}
{{- if $cloudSqlProxy.enabled }}
{{- if eq (default "" $cloudSqlProxyImage.tag) "latest" }}
{{- fail "cloudSqlProxy.image.tag=latest is not allowed; pin a Cloud SQL Auth Proxy version tag or immutable digest." }}
{{- end }}
{{- if not $cloudSqlProxy.instanceConnectionName }}
{{- fail "cloudSqlProxy.enabled=true requires cloudSqlProxy.instanceConnectionName in PROJECT:REGION:INSTANCE form." }}
{{- end }}
{{- if ne (toString (default "127.0.0.1" $cloudSqlProxy.address)) "127.0.0.1" }}
{{- fail "cloudSqlProxy.address must be 127.0.0.1 so Cloud SQL is exposed only inside the pod and the proxy receives an IP address." }}
{{- end }}
{{- if eq $cloudSqlProxyHealthCheckPort (int (default 5432 $cloudSqlProxy.port)) }}
{{- fail "cloudSqlProxy.healthCheck.port must be distinct from cloudSqlProxy.port so the proxy database listener and startup health server do not conflict." }}
{{- end }}
{{- end }}
{{- if eq $.Values.cloud.deploymentTier "public_production" }}
{{- if not $.Values.roles.web.enabled }}
{{- fail "cloud.deploymentTier=public_production requires roles.web.enabled=true." }}
{{- end }}
{{- if not $.Values.roles.worker.enabled }}
{{- fail "cloud.deploymentTier=public_production requires roles.worker.enabled=true." }}
{{- end }}
{{- if not $.Values.roles.scheduler.enabled }}
{{- fail "cloud.deploymentTier=public_production requires roles.scheduler.enabled=true." }}
{{- end }}
{{- if eq $.Values.cloud.auth.mode "none" }}
{{- fail "cloud.deploymentTier=public_production requires cloud.auth.mode=oidc or header." }}
{{- end }}
{{- if not $.Values.cloud.auth.signupMode }}
{{- fail "cloud.deploymentTier=public_production requires cloud.auth.signupMode so org auto-provisioning is explicit." }}
{{- end }}
{{- if and $.Values.roles.web.enabled (not $.Values.cloud.publicUrl) }}
{{- fail "cloud.deploymentTier=public_production web role requires cloud.publicUrl for HTTPS redirects, cookies, and proxy safety." }}
{{- end }}
{{- if or $.Values.cloud.controlPlaneUrl $.Values.cloud.secretKey $.Values.cloud.cookieSecret $.Values.cloud.auth.headerSecret $.Values.cloud.internalToken $.Values.cloud.oidcClientSecret $.Values.cloud.observability.otlpHeaders $.Values.cloud.objectStore.accessKeyId $.Values.cloud.objectStore.secretAccessKey $.Values.cloud.objectStore.bearerToken $.Values.cloud.objectStore.sasToken }}
{{- fail "cloud.deploymentTier=public_production rejects inline secret-bearing Helm values; set cloud.existingSecret for raw credentials and use managed secret refs for envelope, cookie, header, and OIDC client secrets." }}
{{- end }}
{{- if not $.Values.cloud.existingSecret }}
{{- fail "cloud.deploymentTier=public_production requires durable Postgres control plane credentials via cloud.existingSecret so raw database URLs do not enter Helm values or release history." }}
{{- end }}
{{- if eq $.Values.cloud.objectStore.kind "filesystem" }}
{{- fail "cloud.deploymentTier=public_production requires provider-backed object storage; cloud.objectStore.kind=filesystem is local/self-host-beta only." }}
{{- end }}
{{- if not $.Values.cloud.objectStore.bucket }}
{{- fail "cloud.deploymentTier=public_production requires cloud.objectStore.bucket." }}
{{- end }}
{{- if and (not $.Values.cloud.secretKeyRef) (not $.Values.cloud.existingSecret) }}
{{- fail "cloud.deploymentTier=public_production requires cloud.secretKeyRef or cloud.existingSecret." }}
{{- end }}
{{- if and $.Values.roles.web.enabled (not $.Values.cloud.cookieSecretRef) (not $.Values.cloud.existingSecret) }}
{{- fail "cloud.deploymentTier=public_production web role requires cloud.cookieSecretRef or cloud.existingSecret." }}
{{- end }}
{{- if and $.Values.roles.web.enabled $.Values.roles.web.autoProcessCommands }}
{{- fail "cloud.deploymentTier=public_production web role must set roles.web.autoProcessCommands=false and use worker roles for execution." }}
{{- end }}
{{- if and $.Values.roles.web.enabled (eq $.Values.cloud.auth.mode "header") (not $.Values.cloud.auth.headerSecretRef) (not $.Values.cloud.existingSecret) }}
{{- fail "cloud.deploymentTier=public_production header auth requires cloud.auth.headerSecretRef or cloud.existingSecret." }}
{{- end }}
{{- if and $.Values.roles.web.enabled (eq $.Values.cloud.auth.mode "header") $.Values.cloud.auth.headerAllowUnsigned }}
{{- fail "cloud.deploymentTier=public_production header auth requires signed trusted headers; cloud.auth.headerAllowUnsigned must be false." }}
{{- end }}
{{- if and $.Values.roles.worker.enabled (not $.Values.cloud.checkpoints.enabled) }}
{{- fail "cloud.deploymentTier=public_production worker role requires cloud.checkpoints.enabled=true." }}
{{- end }}
{{- end }}
{{- range $roleName, $role := .Values.roles }}
{{- if $role.enabled }}
{{- $roleTerminationGracePeriodSeconds := int (default 60 $role.terminationGracePeriodSeconds) }}
{{- $cloudSqlProxyMaxSigtermDelay := default (printf "%ds" $roleTerminationGracePeriodSeconds) $cloudSqlProxy.maxSigtermDelay }}
{{- $cloudSqlProxyMinSigtermDelay := default "0s" $cloudSqlProxy.minSigtermDelay }}
{{- if and (eq $roleName "web") (eq $.Values.cloud.auth.mode "oidc") (or (not $.Values.cloud.auth.oidcIssuerUrl) (not $.Values.cloud.auth.oidcClientId)) }}
{{- fail "cloud.auth.mode=oidc requires cloud.auth.oidcIssuerUrl and cloud.auth.oidcClientId." }}
{{- end }}
{{- if and (eq $roleName "web") (eq $.Values.cloud.auth.mode "none") (not $.Values.cloud.allowInsecureAuth) }}
{{- fail "cloud.auth.mode=none requires explicit cloud.allowInsecureAuth=true for local/demo Kubernetes installs; set cloud.auth.mode=oidc/header for production." }}
{{- end }}
{{- if and (eq $roleName "web") (eq $.Values.cloud.auth.mode "none") $.Values.cloud.allowInsecureAuth (or $.Values.ingress.enabled (ne $.Values.service.type "ClusterIP")) (not $.Values.cloud.allowInsecurePublicAuth) }}
{{- fail "cloud.auth.mode=none with public service or ingress requires explicit cloud.allowInsecurePublicAuth=true; set cloud.auth.mode=oidc/header for production." }}
{{- end }}
{{- if and (or (eq $roleName "worker") (eq $roleName "scheduler")) (not $.Values.cloud.controlPlaneUrl) (not $.Values.cloud.existingSecret) }}
{{- fail "worker and scheduler roles require a shared control plane; set cloud.controlPlaneUrl or cloud.existingSecret." }}
{{- end }}
{{- if and (eq $roleName "worker") $role.persistence.enabled (gt (int $role.replicas) 1) }}
{{- fail "roles.worker.persistence.enabled cannot be used with roles.worker.replicas > 1; use object-store checkpoints and ephemeral worker roots for horizontally scaled workers." }}
{{- end }}
{{- if and (eq $roleName "worker") (gt (int $role.replicas) 1) (not $.Values.cloud.checkpoints.enabled) }}
{{- fail "roles.worker.replicas > 1 requires cloud.checkpoints.enabled=true so another worker can restore runtime/workspace state." }}
{{- end }}
{{- if and (eq $roleName "worker") (gt (int $role.replicas) 1) (not $role.checkpointsEnabled) }}
{{- fail "roles.worker.replicas > 1 requires roles.worker.checkpointsEnabled=true." }}
{{- end }}
{{- if and (eq $roleName "worker") (gt (int $role.replicas) 1) (eq $.Values.cloud.objectStore.kind "filesystem") }}
{{- fail "roles.worker.replicas > 1 requires a shared object store; cloud.objectStore.kind=filesystem is local/demo-only." }}
{{- end }}
{{- if and (eq $roleName "worker") (gt (int $role.replicas) 1) (not $.Values.cloud.objectStore.bucket) }}
{{- fail "roles.worker.replicas > 1 requires cloud.objectStore.bucket for artifacts, snapshots, and checkpoints." }}
{{- end }}
{{- if and (eq $roleName "worker") (lt (int $role.terminationGracePeriodSeconds) 30) }}
{{- fail "roles.worker.terminationGracePeriodSeconds must be >= 30 so active commands can drain before runtime shutdown." }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-cowork-cloud.fullname" $ }}-{{ $roleName }}
  labels:
    {{- include "open-cowork-cloud.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $roleName }}
spec:
  replicas: {{ $role.replicas }}
  {{- with $role.updateStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "open-cowork-cloud.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $roleName }}
  template:
    metadata:
      labels:
        {{- include "open-cowork-cloud.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $roleName }}
    spec:
      serviceAccountName: {{ include "open-cowork-cloud.serviceAccountName" $ }}
      automountServiceAccountToken: {{ $.Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ $role.terminationGracePeriodSeconds }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $cloudSqlProxy.enabled }}
      initContainers:
        - name: cloud-sql-proxy
          restartPolicy: Always
          image: "{{ include "open-cowork-cloud.cloudSqlProxyImage" $ }}"
          imagePullPolicy: {{ default "IfNotPresent" $cloudSqlProxyImage.pullPolicy }}
          args:
            - "--address={{ default "127.0.0.1" $cloudSqlProxy.address }}"
            - "--port={{ default 5432 $cloudSqlProxy.port }}"
            - "--health-check"
            - "--http-address=127.0.0.1"
            - "--http-port={{ $cloudSqlProxyHealthCheckPort }}"
            - "--min-sigterm-delay={{ $cloudSqlProxyMinSigtermDelay }}"
            - "--max-sigterm-delay={{ $cloudSqlProxyMaxSigtermDelay }}"
            {{- if $cloudSqlProxy.privateIp }}
            - "--private-ip"
            {{- end }}
            {{- if $cloudSqlProxy.autoIamAuthn }}
            - "--auto-iam-authn"
            {{- end }}
            {{- if $cloudSqlProxy.structuredLogs }}
            - "--structured-logs"
            {{- end }}
            {{- if $cloudSqlProxy.runConnectionTest }}
            - "--run-connection-test"
            {{- end }}
            - {{ $cloudSqlProxy.instanceConnectionName | quote }}
          startupProbe:
            exec:
              command:
                - /cloud-sql-proxy
                - wait
                - "--http-address=127.0.0.1"
                - "--http-port={{ $cloudSqlProxyHealthCheckPort }}"
                - "--max={{ $cloudSqlProxyHealthCheckWaitTimeout }}"
            periodSeconds: {{ default 2 $cloudSqlProxyStartupProbe.periodSeconds }}
            timeoutSeconds: {{ default 2 $cloudSqlProxyStartupProbe.timeoutSeconds }}
            failureThreshold: {{ default 30 $cloudSqlProxyStartupProbe.failureThreshold }}
          {{- with $.Values.cloudSqlProxy.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.cloudSqlProxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: open-cowork-cloud
          image: "{{ include "open-cowork-cloud.image" $ }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- with $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "open-cowork-cloud.fullname" $ }}-config
            - secretRef:
                name: {{ include "open-cowork-cloud.secretName" $ }}
          env:
            - name: OPEN_COWORK_CLOUD_ROLE
              value: {{ $roleName | quote }}
            {{- if eq $roleName "web" }}
            - name: OPEN_COWORK_CLOUD_HOST
              value: "0.0.0.0"
            - name: OPEN_COWORK_CLOUD_PORT
              value: {{ $role.port | quote }}
            - name: OPEN_COWORK_CLOUD_AUTO_PROCESS_COMMANDS
              value: {{ $role.autoProcessCommands | quote }}
            {{- end }}
            {{- if eq $roleName "worker" }}
            - name: OPEN_COWORK_CLOUD_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPEN_COWORK_CLOUD_WORKER_POLL_MS
              value: {{ $role.pollMs | quote }}
            {{- end }}
            {{- if eq $roleName "scheduler" }}
            - name: OPEN_COWORK_CLOUD_SCHEDULER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPEN_COWORK_CLOUD_SCHEDULER_POLL_MS
              value: {{ $role.pollMs | quote }}
            {{- end }}
          {{- if eq $roleName "web" }}
          ports:
            - name: http
              containerPort: {{ $role.port }}
          {{- if $role.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: {{ $role.startupProbe.periodSeconds }}
            timeoutSeconds: {{ $role.startupProbe.timeoutSeconds }}
            failureThreshold: {{ $role.startupProbe.failureThreshold }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          {{- end }}
          {{- with $role.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cloud-root
              mountPath: {{ $.Values.cloud.root }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cloud-root
          {{- if and (eq $roleName "worker") $role.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "open-cowork-cloud.fullname" $ }}-worker-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with $role.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
