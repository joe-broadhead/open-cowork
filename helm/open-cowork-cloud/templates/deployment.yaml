{{- if and (not $.Values.image.tag) (not $.Values.image.digest) }}
{{- fail "image.tag or image.digest is required; pin a release tag or immutable digest instead of relying on latest." }}
{{- end }}
{{- if eq $.Values.image.tag "latest" }}
{{- fail "image.tag=latest is not allowed; pin a release tag or immutable digest for reproducible deployments." }}
{{- end }}
{{- range $roleName, $role := .Values.roles }}
{{- if $role.enabled }}
{{- if and (eq $roleName "web") (eq $.Values.cloud.auth.mode "oidc") (or (not $.Values.cloud.auth.oidcIssuerUrl) (not $.Values.cloud.auth.oidcClientId)) }}
{{- fail "cloud.auth.mode=oidc requires cloud.auth.oidcIssuerUrl and cloud.auth.oidcClientId." }}
{{- end }}
{{- if and (eq $roleName "web") (eq $.Values.cloud.auth.mode "none") (not $.Values.cloud.allowInsecureAuth) }}
{{- fail "cloud.auth.mode=none requires explicit cloud.allowInsecureAuth=true for local/demo Kubernetes installs; set cloud.auth.mode=oidc/header for production." }}
{{- end }}
{{- if and (eq $roleName "web") (eq $.Values.cloud.auth.mode "none") $.Values.cloud.allowInsecureAuth (or $.Values.ingress.enabled (ne $.Values.service.type "ClusterIP")) (not $.Values.cloud.allowInsecurePublicAuth) }}
{{- fail "cloud.auth.mode=none with public service or ingress requires explicit cloud.allowInsecurePublicAuth=true; set cloud.auth.mode=oidc/header for production." }}
{{- end }}
{{- if and (or (eq $roleName "worker") (eq $roleName "scheduler")) (not $.Values.cloud.controlPlaneUrl) (not $.Values.cloud.existingSecret) }}
{{- fail "worker and scheduler roles require a shared control plane; set cloud.controlPlaneUrl or cloud.existingSecret." }}
{{- end }}
{{- if and (eq $roleName "worker") $role.persistence.enabled (gt (int $role.replicas) 1) }}
{{- fail "roles.worker.persistence.enabled cannot be used with roles.worker.replicas > 1; use object-store checkpoints and ephemeral worker roots for horizontally scaled workers." }}
{{- end }}
{{- if and (eq $roleName "worker") (gt (int $role.replicas) 1) (not $.Values.cloud.checkpoints.enabled) }}
{{- fail "roles.worker.replicas > 1 requires cloud.checkpoints.enabled=true so another worker can restore runtime/workspace state." }}
{{- end }}
{{- if and (eq $roleName "worker") (gt (int $role.replicas) 1) (not $role.checkpointsEnabled) }}
{{- fail "roles.worker.replicas > 1 requires roles.worker.checkpointsEnabled=true." }}
{{- end }}
{{- if and (eq $roleName "worker") (gt (int $role.replicas) 1) (eq $.Values.cloud.objectStore.kind "filesystem") }}
{{- fail "roles.worker.replicas > 1 requires a shared object store; cloud.objectStore.kind=filesystem is local/demo-only." }}
{{- end }}
{{- if and (eq $roleName "worker") (gt (int $role.replicas) 1) (not $.Values.cloud.objectStore.bucket) }}
{{- fail "roles.worker.replicas > 1 requires cloud.objectStore.bucket for artifacts, snapshots, and checkpoints." }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-cowork-cloud.fullname" $ }}-{{ $roleName }}
  labels:
    {{- include "open-cowork-cloud.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $roleName }}
spec:
  replicas: {{ $role.replicas }}
  selector:
    matchLabels:
      {{- include "open-cowork-cloud.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $roleName }}
  template:
    metadata:
      labels:
        {{- include "open-cowork-cloud.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $roleName }}
    spec:
      serviceAccountName: {{ include "open-cowork-cloud.serviceAccountName" $ }}
      automountServiceAccountToken: {{ $.Values.serviceAccount.automountServiceAccountToken }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: open-cowork-cloud
          image: "{{ include "open-cowork-cloud.image" $ }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- with $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "open-cowork-cloud.fullname" $ }}-config
            - secretRef:
                name: {{ include "open-cowork-cloud.secretName" $ }}
          env:
            - name: OPEN_COWORK_CLOUD_ROLE
              value: {{ $roleName | quote }}
            {{- if eq $roleName "web" }}
            - name: OPEN_COWORK_CLOUD_HOST
              value: "0.0.0.0"
            - name: OPEN_COWORK_CLOUD_PORT
              value: {{ $role.port | quote }}
            - name: OPEN_COWORK_CLOUD_AUTO_PROCESS_COMMANDS
              value: {{ $role.autoProcessCommands | quote }}
            {{- end }}
            {{- if eq $roleName "worker" }}
            - name: OPEN_COWORK_CLOUD_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPEN_COWORK_CLOUD_WORKER_POLL_MS
              value: {{ $role.pollMs | quote }}
            {{- end }}
            {{- if eq $roleName "scheduler" }}
            - name: OPEN_COWORK_CLOUD_SCHEDULER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPEN_COWORK_CLOUD_SCHEDULER_POLL_MS
              value: {{ $role.pollMs | quote }}
            {{- end }}
          {{- if eq $roleName "web" }}
          ports:
            - name: http
              containerPort: {{ $role.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          {{- end }}
          {{- with $role.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if eq $roleName "worker" }}
          volumeMounts:
            - name: worker-data
              mountPath: {{ $.Values.cloud.root }}
          {{- end }}
      {{- if eq $roleName "worker" }}
      volumes:
        - name: worker-data
          {{- if $role.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "open-cowork-cloud.fullname" $ }}-worker-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      {{- with $role.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
