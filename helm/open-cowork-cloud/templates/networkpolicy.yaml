{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "open-cowork-cloud.fullname" . }}-default-deny
  labels:
    {{- include "open-cowork-cloud.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "open-cowork-cloud.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  {{- with .Values.networkPolicy.egress.to }}
  egress:
    - to:
        {{- toYaml . | nindent 8 }}
  {{- else }}
  egress: []
  {{- end }}
  {{- end }}
{{- if .Values.roles.web.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "open-cowork-cloud.fullname" . }}-web-ingress
  labels:
    {{- include "open-cowork-cloud.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "open-cowork-cloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.roles.web.port }}
      {{- with .Values.networkPolicy.ingress.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
