apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "open-cowork-cloud.fullname" . }}-config
  labels:
    {{- include "open-cowork-cloud.labels" . | nindent 4 }}
data:
  OPEN_COWORK_CLOUD_PROFILE: {{ .Values.cloud.profile | quote }}
  OPEN_COWORK_CLOUD_DEPLOYMENT_TIER: {{ .Values.cloud.deploymentTier | quote }}
  OPEN_COWORK_CONFIG_PATH: {{ .Values.cloud.configPath | quote }}
  OPEN_COWORK_CONFIG_DIR: {{ .Values.cloud.configDir | quote }}
  OPEN_COWORK_DOWNSTREAM_ROOT: {{ .Values.cloud.downstreamRoot | quote }}
  OPEN_COWORK_CLOUD_ROOT: {{ .Values.cloud.root | quote }}
  OPEN_COWORK_CLOUD_SHUTDOWN_GRACE_MS: {{ .Values.cloud.shutdownGraceMs | quote }}
  OPEN_COWORK_CLOUD_AUTH_MODE: {{ .Values.cloud.auth.mode | quote }}
  OPEN_COWORK_CLOUD_ALLOW_INSECURE_AUTH: {{ .Values.cloud.allowInsecureAuth | quote }}
  OPEN_COWORK_CLOUD_SIGNUP_MODE: {{ .Values.cloud.auth.signupMode | quote }}
  OPEN_COWORK_CLOUD_ALLOW_SELF_SERVICE_SIGNUP: {{ .Values.cloud.auth.allowSelfServiceSignup | quote }}
  OPEN_COWORK_CLOUD_OIDC_ISSUER_URL: {{ .Values.cloud.auth.oidcIssuerUrl | quote }}
  OPEN_COWORK_CLOUD_OIDC_CLIENT_ID: {{ .Values.cloud.auth.oidcClientId | quote }}
  OPEN_COWORK_CLOUD_OIDC_CALLBACK_PATH: {{ .Values.cloud.auth.oidcCallbackPath | quote }}
  OPEN_COWORK_CLOUD_ALLOWED_EMAIL_DOMAINS: {{ join "," .Values.cloud.auth.allowedEmailDomains | quote }}
  OPEN_COWORK_CLOUD_HEADER_AUTH_ALLOW_UNSIGNED: {{ .Values.cloud.auth.headerAllowUnsigned | quote }}
  OPEN_COWORK_CLOUD_HEADER_AUTH_MAX_SIGNATURE_AGE_MS: {{ .Values.cloud.auth.headerMaxSignatureAgeMs | quote }}
  OPEN_COWORK_CLOUD_API_TOKEN_DEFAULT_TTL_MS: {{ .Values.cloud.auth.apiTokenDefaultTtlMs | quote }}
  OPEN_COWORK_CLOUD_API_TOKEN_MAX_TTL_MS: {{ .Values.cloud.auth.apiTokenMaxTtlMs | quote }}
  OPEN_COWORK_CLOUD_API_TOKEN_ALLOWED_SCOPES: {{ join "," .Values.cloud.auth.apiTokenAllowedScopes | quote }}
  OPEN_COWORK_CLOUD_COOKIE_SECURE: {{ .Values.cloud.cookieSecure | quote }}
  OPEN_COWORK_CLOUD_PUBLIC_URL: {{ .Values.cloud.publicUrl | quote }}
  OPEN_COWORK_CLOUD_TRUST_PROXY_HEADERS: {{ .Values.cloud.trustProxyHeaders | quote }}
  OPEN_COWORK_CLOUD_PUBLIC_BRANDING_JSON: {{ .Values.cloud.branding | toJson | quote }}
  OPEN_COWORK_CLOUD_SERVICE_NAME: {{ .Values.cloud.observability.serviceName | quote }}
  OPEN_COWORK_CLOUD_SERVICE_VERSION: {{ .Values.cloud.observability.serviceVersion | quote }}
  OPEN_COWORK_CLOUD_LOG_FORMAT: {{ .Values.cloud.observability.logFormat | quote }}
  OPEN_COWORK_CLOUD_OTLP_ENDPOINT: {{ .Values.cloud.observability.otlpEndpoint | quote }}
  OPEN_COWORK_CLOUD_OTLP_FLUSH_INTERVAL_MS: {{ .Values.cloud.observability.otlpFlushIntervalMs | quote }}
  OPEN_COWORK_CLOUD_OTLP_MAX_QUEUE_SIZE: {{ .Values.cloud.observability.otlpMaxQueueSize | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_KIND: {{ .Values.cloud.objectStore.kind | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_BUCKET: {{ .Values.cloud.objectStore.bucket | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_REGION: {{ .Values.cloud.objectStore.region | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_ENDPOINT: {{ .Values.cloud.objectStore.endpoint | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_PREFIX: {{ .Values.cloud.objectStore.prefix | quote }}
  OPEN_COWORK_CLOUD_CHECKPOINTS_ENABLED: {{ and .Values.cloud.checkpoints.enabled .Values.roles.worker.checkpointsEnabled | quote }}
