{{- if not .Values.cloud.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-cowork-cloud.secretName" . }}
  labels:
    {{- include "open-cowork-cloud.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPEN_COWORK_CLOUD_CONTROL_PLANE_URL: {{ .Values.cloud.controlPlaneUrl | quote }}
  OPEN_COWORK_CLOUD_SECRET_KEY: {{ .Values.cloud.secretKey | quote }}
  OPEN_COWORK_CLOUD_SECRET_KEY_REF: {{ .Values.cloud.secretKeyRef | quote }}
  OPEN_COWORK_CLOUD_COOKIE_SECRET: {{ .Values.cloud.cookieSecret | quote }}
  OPEN_COWORK_CLOUD_COOKIE_SECRET_REF: {{ .Values.cloud.cookieSecretRef | quote }}
  OPEN_COWORK_CLOUD_INTERNAL_TOKEN: {{ .Values.cloud.internalToken | quote }}
  OPEN_COWORK_CLOUD_INTERNAL_TOKEN_REF: {{ .Values.cloud.internalTokenRef | quote }}
  OPEN_COWORK_CLOUD_OIDC_CLIENT_SECRET: {{ .Values.cloud.oidcClientSecret | quote }}
  OPEN_COWORK_CLOUD_OIDC_CLIENT_SECRET_REF: {{ .Values.cloud.auth.oidcClientSecretRef | quote }}
  OPEN_COWORK_CLOUD_OTLP_HEADERS: {{ .Values.cloud.observability.otlpHeaders | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_ACCESS_KEY_ID: {{ .Values.cloud.objectStore.accessKeyId | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_SECRET_ACCESS_KEY: {{ .Values.cloud.objectStore.secretAccessKey | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_BEARER_TOKEN: {{ .Values.cloud.objectStore.bearerToken | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_SAS_TOKEN: {{ .Values.cloud.objectStore.sasToken | quote }}
  OPEN_COWORK_CLOUD_OBJECT_STORE_ACCOUNT_NAME: {{ .Values.cloud.objectStore.accountName | quote }}
{{- end }}
