{{- if and .Values.roles.worker.enabled .Values.roles.worker.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "open-cowork-cloud.fullname" . }}-worker-data
  labels:
    {{- include "open-cowork-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.roles.worker.persistence.storageClassName }}
  storageClassName: {{ .Values.roles.worker.persistence.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.roles.worker.persistence.size | quote }}
{{- end }}
