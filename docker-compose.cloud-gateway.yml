# Local/demo Cloud plus Gateway reference only. Published ports bind to
# loopback by default. Production overlays must pin OCI images, replace demo
# secrets, use HTTPS public URLs, and move Postgres/object storage to
# provider-managed services.
services:
  open-cowork-cloud:
    init: true
    restart: unless-stopped
    image: ${OPEN_COWORK_CLOUD_IMAGE:-open-cowork-cloud:local}
    build:
      context: .
      dockerfile: docker/open-cowork-cloud/Dockerfile
    environment:
      OPEN_COWORK_CLOUD_ROLE: all-in-one
      OPEN_COWORK_CLOUD_PROFILE: full
      OPEN_COWORK_CLOUD_DEPLOYMENT_TIER: local
      # Default to the in-container mount targets so a config dropped at the advertised
      # bind-mount path is actually loaded out-of-box. An explicit external value still
      # wins (and the volume mounts the same path), so this stays backward-compatible.
      OPEN_COWORK_CONFIG_PATH: ${OPEN_COWORK_CONFIG_PATH:-/etc/open-cowork/open-cowork.config.json}
      OPEN_COWORK_CONFIG_DIR: ${OPEN_COWORK_CONFIG_DIR:-/etc/open-cowork/config}
      OPEN_COWORK_DOWNSTREAM_ROOT: ${OPEN_COWORK_DOWNSTREAM_ROOT:-/etc/open-cowork/downstream}
      OPEN_COWORK_CLOUD_ROOT: /data/open-cowork-cloud
      OPEN_COWORK_CLOUD_HOST: 0.0.0.0
      OPEN_COWORK_CLOUD_ALLOW_INSECURE_AUTH: "true"
      OPEN_COWORK_CLOUD_SIGNUP_MODE: ${OPEN_COWORK_CLOUD_SIGNUP_MODE:-open}
      OPEN_COWORK_CLOUD_HEADER_AUTH_SECRET: ${OPEN_COWORK_CLOUD_HEADER_AUTH_SECRET:-}
      OPEN_COWORK_CLOUD_HEADER_AUTH_SECRET_REF: ${OPEN_COWORK_CLOUD_HEADER_AUTH_SECRET_REF:-}
      OPEN_COWORK_CLOUD_HEADER_AUTH_ALLOW_UNSIGNED: ${OPEN_COWORK_CLOUD_HEADER_AUTH_ALLOW_UNSIGNED:-false}
      OPEN_COWORK_CLOUD_HEADER_AUTH_MAX_SIGNATURE_AGE_MS: ${OPEN_COWORK_CLOUD_HEADER_AUTH_MAX_SIGNATURE_AGE_MS:-300000}
      OPEN_COWORK_CLOUD_API_TOKEN_DEFAULT_TTL_MS: ${OPEN_COWORK_CLOUD_API_TOKEN_DEFAULT_TTL_MS:-7776000000}
      OPEN_COWORK_CLOUD_API_TOKEN_MAX_TTL_MS: ${OPEN_COWORK_CLOUD_API_TOKEN_MAX_TTL_MS:-31536000000}
      OPEN_COWORK_CLOUD_API_TOKEN_ALLOWED_SCOPES: ${OPEN_COWORK_CLOUD_API_TOKEN_ALLOWED_SCOPES:-desktop,gateway,admin,operator}
      OPEN_COWORK_CLOUD_PORT: 8787
      OPEN_COWORK_CLOUD_SECRET_KEY: ${OPEN_COWORK_CLOUD_SECRET_KEY:-change-me-for-local-dev}
      OPEN_COWORK_CLOUD_COOKIE_SECRET: ${OPEN_COWORK_CLOUD_COOKIE_SECRET:-change-me-for-local-cookie-secret}
      OPEN_COWORK_CLOUD_INTERNAL_TOKEN: ${OPEN_COWORK_CLOUD_INTERNAL_TOKEN:-change-me-for-local-internal-token}
      OPEN_COWORK_CLOUD_COOKIE_SECURE: "false"
      OPEN_COWORK_CLOUD_PUBLIC_URL: ${OPEN_COWORK_CLOUD_PUBLIC_URL:-http://localhost:8787}
      OPEN_COWORK_CLOUD_TRUST_PROXY_HEADERS: ${OPEN_COWORK_CLOUD_TRUST_PROXY_HEADERS:-false}
      OPEN_COWORK_CLOUD_TRUSTED_PROXY_CIDRS: ${OPEN_COWORK_CLOUD_TRUSTED_PROXY_CIDRS:-}
      OPEN_COWORK_CLOUD_SERVICE_NAME: open-cowork-cloud
      OPEN_COWORK_CLOUD_LOG_FORMAT: json
      OPEN_COWORK_CLOUD_SHUTDOWN_GRACE_MS: 30000
      OPEN_COWORK_CLOUD_AUTO_PROCESS_COMMANDS: "true"
      OPEN_COWORK_CLOUD_CHECKPOINTS_ENABLED: "true"
      OPEN_COWORK_CLOUD_CONTROL_PLANE_URL: postgres://open_cowork:open_cowork@postgres:5432/open_cowork
      OPEN_COWORK_CLOUD_OBJECT_STORE_KIND: minio
      OPEN_COWORK_CLOUD_OBJECT_STORE_ENDPOINT: http://minio:9000
      OPEN_COWORK_CLOUD_OBJECT_STORE_BUCKET: open-cowork
      OPEN_COWORK_CLOUD_OBJECT_STORE_ACCESS_KEY_ID: open_cowork
      OPEN_COWORK_CLOUD_OBJECT_STORE_SECRET_ACCESS_KEY: ${OPEN_COWORK_CLOUD_OBJECT_STORE_SECRET_ACCESS_KEY:-open_cowork_local_dev}
    ports:
      - "${OPEN_COWORK_CLOUD_PUBLISHED_ADDR:-127.0.0.1}:8787:8787"
    volumes:
      - open-cowork-cloud-data:/data/open-cowork-cloud
      - ${OPEN_COWORK_CONFIG_PATH:-./open-cowork.config.json}:${OPEN_COWORK_CONFIG_PATH:-/etc/open-cowork/open-cowork.config.json}:ro
      - ${OPEN_COWORK_CONFIG_DIR:-.}:${OPEN_COWORK_CONFIG_DIR:-/etc/open-cowork/config}:ro
      - ${OPEN_COWORK_DOWNSTREAM_ROOT:-.}:${OPEN_COWORK_DOWNSTREAM_ROOT:-/etc/open-cowork/downstream}:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  open-cowork-gateway:
    init: true
    restart: unless-stopped
    image: ${OPEN_COWORK_GATEWAY_IMAGE:-open-cowork-gateway:local}
    build:
      context: .
      dockerfile: docker/open-cowork-gateway/Dockerfile
    environment:
      OPEN_COWORK_CLOUD_BASE_URL: http://open-cowork-cloud:8787
      # Default to the in-container mount targets so a config dropped at the advertised
      # bind-mount path is actually loaded out-of-box. An explicit external value still
      # wins (and the volume mounts the same path), so this stays backward-compatible.
      OPEN_COWORK_CONFIG_PATH: ${OPEN_COWORK_CONFIG_PATH:-/etc/open-cowork/open-cowork.config.json}
      OPEN_COWORK_CONFIG_DIR: ${OPEN_COWORK_CONFIG_DIR:-/etc/open-cowork/config}
      OPEN_COWORK_DOWNSTREAM_ROOT: ${OPEN_COWORK_DOWNSTREAM_ROOT:-/etc/open-cowork/downstream}
      OPEN_COWORK_GATEWAY_ALLOW_INSECURE_HTTP: "true"
      OPEN_COWORK_GATEWAY_SERVICE_TOKEN: ${OPEN_COWORK_GATEWAY_SERVICE_TOKEN:-replace-with-dashboard-gateway-token}
      OPEN_COWORK_GATEWAY_ADMIN_TOKEN: ${OPEN_COWORK_GATEWAY_ADMIN_TOKEN:?set OPEN_COWORK_GATEWAY_ADMIN_TOKEN to a random operator token}
      OPEN_COWORK_GATEWAY_HOST: 0.0.0.0
      OPEN_COWORK_GATEWAY_PORT: 8790
      OPEN_COWORK_GATEWAY_PUBLIC_URL: ${OPEN_COWORK_GATEWAY_PUBLIC_URL:-}
      OPEN_COWORK_GATEWAY_TRUST_PROXY_HEADERS: ${OPEN_COWORK_GATEWAY_TRUST_PROXY_HEADERS:-false}
      OPEN_COWORK_GATEWAY_TRUSTED_PROXY_CIDRS: ${OPEN_COWORK_GATEWAY_TRUSTED_PROXY_CIDRS:-}
      OPEN_COWORK_GATEWAY_MAX_REQUEST_BODY_BYTES: ${OPEN_COWORK_GATEWAY_MAX_REQUEST_BODY_BYTES:-1048576}
      OPEN_COWORK_GATEWAY_CLOUD_REQUEST_TIMEOUT_MS: ${OPEN_COWORK_GATEWAY_CLOUD_REQUEST_TIMEOUT_MS:-30000}
      OPEN_COWORK_GATEWAY_WEBHOOK_DELIVERY_TIMEOUT_MS: ${OPEN_COWORK_GATEWAY_WEBHOOK_DELIVERY_TIMEOUT_MS:-15000}
      OPEN_COWORK_GATEWAY_SMTP_TIMEOUT_MS: ${OPEN_COWORK_GATEWAY_SMTP_TIMEOUT_MS:-30000}
      OPEN_COWORK_GATEWAY_SHUTDOWN_DRAIN_TIMEOUT_MS: ${OPEN_COWORK_GATEWAY_SHUTDOWN_DRAIN_TIMEOUT_MS:-10000}
      OPEN_COWORK_GATEWAY_PRODUCT_MODE: cloud_channel
      OPEN_COWORK_GATEWAY_MODE: self-host
      OPEN_COWORK_GATEWAY_LOG_LEVEL: info
      OPEN_COWORK_GATEWAY_METRICS_ENABLED: "false"
      OPEN_COWORK_GATEWAY_DIAGNOSTICS_ENABLED: "false"
      OPEN_COWORK_GATEWAY_ENABLE_FAKE_PROVIDER: ${OPEN_COWORK_GATEWAY_ENABLE_FAKE_PROVIDER:-false}
      OPEN_COWORK_GATEWAY_ALLOW_PUBLIC_FAKE_PROVIDER: ${OPEN_COWORK_GATEWAY_ALLOW_PUBLIC_FAKE_PROVIDER:-false}
      OPEN_COWORK_GATEWAY_FAKE_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_FAKE_CHANNEL_BINDING_ID:-fake-binding}
      OPEN_COWORK_GATEWAY_TELEGRAM_BOT_TOKEN: ${OPEN_COWORK_GATEWAY_TELEGRAM_BOT_TOKEN:-}
      OPEN_COWORK_GATEWAY_TELEGRAM_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_TELEGRAM_CHANNEL_BINDING_ID:-telegram}
      OPEN_COWORK_GATEWAY_TELEGRAM_MODE: ${OPEN_COWORK_GATEWAY_TELEGRAM_MODE:-polling}
      OPEN_COWORK_GATEWAY_TELEGRAM_PUBLIC_URL: ${OPEN_COWORK_GATEWAY_TELEGRAM_PUBLIC_URL:-}
      OPEN_COWORK_GATEWAY_TELEGRAM_WEBHOOK_SECRET: ${OPEN_COWORK_GATEWAY_TELEGRAM_WEBHOOK_SECRET:-}
      OPEN_COWORK_GATEWAY_SLACK_BOT_TOKEN: ${OPEN_COWORK_GATEWAY_SLACK_BOT_TOKEN:-}
      OPEN_COWORK_GATEWAY_SLACK_SIGNING_SECRET: ${OPEN_COWORK_GATEWAY_SLACK_SIGNING_SECRET:-}
      OPEN_COWORK_GATEWAY_SLACK_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_SLACK_CHANNEL_BINDING_ID:-slack}
      OPEN_COWORK_GATEWAY_SLACK_TEAM_ID: ${OPEN_COWORK_GATEWAY_SLACK_TEAM_ID:-}
      OPEN_COWORK_GATEWAY_EMAIL_INBOUND_SECRET: ${OPEN_COWORK_GATEWAY_EMAIL_INBOUND_SECRET:-}
      OPEN_COWORK_GATEWAY_EMAIL_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_EMAIL_CHANNEL_BINDING_ID:-email}
      OPEN_COWORK_GATEWAY_EMAIL_MAX_ATTACHMENT_BYTES: ${OPEN_COWORK_GATEWAY_EMAIL_MAX_ATTACHMENT_BYTES:-1048576}
      OPEN_COWORK_GATEWAY_EMAIL_FROM: ${OPEN_COWORK_GATEWAY_EMAIL_FROM:-}
      OPEN_COWORK_GATEWAY_EMAIL_ADDRESS: ${OPEN_COWORK_GATEWAY_EMAIL_ADDRESS:-}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_HOST: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_HOST:-}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_PORT: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_PORT:-587}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_SECURE: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_SECURE:-false}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_USERNAME: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_USERNAME:-}
      OPEN_COWORK_GATEWAY_EMAIL_SMTP_PASSWORD: ${OPEN_COWORK_GATEWAY_EMAIL_SMTP_PASSWORD:-}
      OPEN_COWORK_GATEWAY_WEBHOOK_DELIVERY_URL: ${OPEN_COWORK_GATEWAY_WEBHOOK_DELIVERY_URL:-}
      OPEN_COWORK_GATEWAY_WEBHOOK_SHARED_SECRET: ${OPEN_COWORK_GATEWAY_WEBHOOK_SHARED_SECRET:-}
      OPEN_COWORK_GATEWAY_WEBHOOK_CHANNEL_BINDING_ID: ${OPEN_COWORK_GATEWAY_WEBHOOK_CHANNEL_BINDING_ID:-webhook}
      OPEN_COWORK_GATEWAY_WEBHOOK_MAX_ATTACHMENT_BYTES: ${OPEN_COWORK_GATEWAY_WEBHOOK_MAX_ATTACHMENT_BYTES:-1048576}
    ports:
      - "${OPEN_COWORK_GATEWAY_PUBLISHED_ADDR:-127.0.0.1}:8790:8790"
    volumes:
      - ${OPEN_COWORK_CONFIG_PATH:-./open-cowork.config.json}:${OPEN_COWORK_CONFIG_PATH:-/etc/open-cowork/open-cowork.config.json}:ro
      - ${OPEN_COWORK_CONFIG_DIR:-.}:${OPEN_COWORK_CONFIG_DIR:-/etc/open-cowork/config}:ro
      - ${OPEN_COWORK_DOWNSTREAM_ROOT:-.}:${OPEN_COWORK_DOWNSTREAM_ROOT:-/etc/open-cowork/downstream}:ro
    depends_on:
      open-cowork-cloud:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_cowork
      POSTGRES_USER: open_cowork
      POSTGRES_PASSWORD: open_cowork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_cowork -d open_cowork"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - open-cowork-cloud-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: open_cowork
      MINIO_ROOT_PASSWORD: open_cowork_local_dev
    ports:
      - "${OPEN_COWORK_MINIO_PUBLISHED_ADDR:-127.0.0.1}:9000:9000"
      - "${OPEN_COWORK_MINIO_CONSOLE_PUBLISHED_ADDR:-127.0.0.1}:9001:9001"
    volumes:
      - open-cowork-cloud-minio:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    restart: on-failure:20
    environment:
      MC_HOST_local: http://open_cowork:open_cowork_local_dev@minio:9000
    command: ["mb", "--ignore-existing", "local/open-cowork"]

volumes:
  open-cowork-cloud-data:
  open-cowork-cloud-postgres:
  open-cowork-cloud-minio:
