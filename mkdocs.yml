      - Workflows: workflows.md
      - Workflow Recipes: workflow-recipes.md
      - Agents: agent-authoring.md
      - Tools & Skills: skills-and-mcps.md
      - Custom MCPs: custom-mcps.md
      - Configuration: configuration.md
  - Build & Extend:
      - Architecture: architecture.md
      - Product Contract: product-contract.md
      - Coordination Model: coordination-model.md
      - Desktop Outbound Pairing: desktop-outbound-pairing.md
      - Cloud Web Workbench: cloud-web-workbench.md
      - Cloud Client SDK: cloud-client.md
      - Gateway Provider Readiness: gateway-provider-readiness.md
      - Downstream Customization: downstream.md
      - Downstream Contract: downstream-contract.md
      - OpenCode SDK Boundary: opencode-sdk-v2-boundary.md
      - Development Environment: development-environment.md
      - Performance: performance.md
      - Security Model: security-model.md
      - Telemetry and Privacy: privacy.md
  - Operate:
      - Open Cowork Cloud: open-cowork-cloud.md
      - Managed Workers: managed-workers.md
      - Cloud Gateway Registration: cloud-gateway-registration.md
      - Deployment Topologies: deployment-topologies.md
      - Hybrid Security Gates: hybrid-security-gates.md
      - Gateway Appliance: gateway-appliance.md
      - Standalone Gateway: standalone-gateway.md
      - Deployment Readiness: deployment-readiness.md
      - Launch Readiness Gates: runbooks/launch-readiness.md
      - Launch Readiness Report: runbooks/launch-readiness-report.md
      - Private Beta Launch: runbooks/private-beta-launch.md
      - Private Beta Support: runbooks/private-beta-support.md
      - Cloud Managed Operations: runbooks/cloud-managed-operations.md
      - Backup and Restore: runbooks/backup-restore.md
      - Restore Drill Report: runbooks/restore-drill-report.md
      - Managed BYOK SaaS: runbooks/managed-byok-saas.md
      - Managed BYOK Boundary: runbooks/managed-byok-saas-boundary.md
      - Branch Protection: branch-protection.md
      - Packaging and Releases: packaging-and-releases.md
      - Release Checklist: release-checklist.md
      - Versioning and Cadence: versioning.md
      - Troubleshooting: troubleshooting.md
  - Project:
      - Roadmap: roadmap.md
      - Contributing: contributing.md
      - First Contribution: first-contribution.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: !ENV [OPEN_COWORK_REPO_URL, "https://github.com/joe-broadhead/open-cowork"]

# Pages not surfaced in the site nav but kept in the docs tree for
# contributors reading the repo directly. Declaring them here silences
# `mkdocs build --strict`'s "not in nav" info message.
not_in_nav: |
  /assets/README.md
