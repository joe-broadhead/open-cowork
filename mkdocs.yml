site_name: Open Cowork
site_description: Desktop AI workspace built on top of OpenCode, with downstream-ready packaging and operations.
site_url: !ENV [OPEN_COWORK_SITE_URL, "https://joe-broadhead.github.io/open-cowork/"]
repo_url: !ENV [OPEN_COWORK_REPO_URL, "https://github.com/joe-broadhead/open-cowork"]
repo_name: !ENV [OPEN_COWORK_REPO_NAME, "joe-broadhead/open-cowork"]
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - content.action.edit
    - content.action.view
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Overview:
      - Home: index.md
      - Getting Started: getting-started.md
      - Desktop App Guide: desktop-app.md
      - Architecture: architecture.md
  - Configuration:
      - Configuration: configuration.md
      - Downstream Customization: downstream.md
  - Operate:
      - Operations and CI: operations.md
      - Packaging and Releases: packaging-and-releases.md
      - Release Checklist: release-checklist.md
      - Versioning and Cadence: versioning.md
      - Performance: performance.md
      - Security Model: security-model.md
      - Troubleshooting: troubleshooting.md
  - Project:
      - Roadmap: roadmap.md
      - Contributing: contributing.md
      - First Contribution: first-contribution.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: !ENV [OPEN_COWORK_REPO_URL, "https://github.com/joe-broadhead/open-cowork"]

# Pages not surfaced in the site nav but kept in the docs tree for
# contributors reading the repo directly. Declaring them here silences
# `mkdocs build --strict`'s "not in nav" info message.
not_in_nav: |
  /assets/README.md
