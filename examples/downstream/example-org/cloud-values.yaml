image:
  repository: registry.example.com/open-cowork-cloud
  tag: v2026.05.0

cloud:
  profile: data-analyst
  publicUrl: https://cowork.example.com
  auth:
    mode: oidc
    oidcIssuerUrl: https://idp.example.com
    oidcClientId: example-cowork-cloud
    oidcClientSecretRef: env:OPEN_COWORK_CLOUD_OIDC_CLIENT_SECRET
    allowedEmailDomains:
      - example.com
  controlPlaneUrl: env:OPEN_COWORK_CLOUD_DATABASE_URL
  cookieSecretRef: env:OPEN_COWORK_CLOUD_COOKIE_SECRET
  secretKeyRef: env:OPEN_COWORK_CLOUD_SECRET_KEY
  internalTokenRef: env:OPEN_COWORK_CLOUD_INTERNAL_TOKEN
  branding:
    productName: Example Cowork
    shortName: EX
    logoUrl: https://assets.example.com/cowork/logo.png
    supportUrl: https://support.example.com/cowork
    privacyUrl: https://legal.example.com/privacy
    securityUrl: https://security.example.com/cowork
    legalUrl: https://legal.example.com/terms
    theme:
      background: "#f7f8f5"
      surface: "#ffffff"
      mutedSurface: "#e8eee9"
      border: "#cfd9d2"
      text: "#142018"
      mutedText: "#5f6f66"
      accent: "#0f6b4b"
      accentStrong: "#0a4c35"
    dashboard:
      title: Example workspace
      subtitle: Manage Example Cowork keys, clients, and channel agents.
      connectionsDescription: Issue scoped Example Cowork tokens for approved desktop and gateway clients.
      gatewayDescription: Connect approved chat channels to Example Cowork cloud sessions.
    managedOrgConnectionLabels:
      desktopToken: Example Desktop token
      gatewayToken: Example Gateway token
      apiToken: Example API token
      cloudUrl: Example Cloud URL
  objectStore:
    kind: s3
    bucket: example-cowork-artifacts
    region: us-east-1
    prefix: production/
    credentialsRef: env:OPEN_COWORK_CLOUD_OBJECT_STORE_CREDENTIALS

roles:
  web:
    enabled: true
    replicas: 2
  worker:
    enabled: true
    replicas: 2
    checkpointsEnabled: true
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: worker
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
  scheduler:
    enabled: true
    replicas: 1

ingress:
  enabled: true
  hosts:
    - host: cowork.example.com
      paths:
        - path: /
          pathType: Prefix

networkPolicy:
  ingress:
    allowAllSourcesForLocalOnly: false
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
        podSelector:
          matchLabels:
            app.kubernetes.io/name: ingress-nginx
