# Example External Secrets Operator wiring for GCP Secret Manager.
# Install External Secrets Operator and configure Workload Identity before use.
# Replace PROJECT, CLUSTER_LOCATION, CLUSTER_NAME, and service account names in
# a private deployment overlay. When cloudSqlProxy.enabled=true in Helm values,
# open-cowork-cloud-control-plane-url must be a least-privilege runtime URL
# pointing at the sidecar with the runtime IAM database username, for example
# postgresql://open-cowork-cloud%40PROJECT.iam@127.0.0.1:5432/open_cowork_cloud?sslmode=disable.
# The separately credentialed migration Job uses automatic IAM authentication
# directly from its manifest; never put its principal on a long-running pod.
# Add OPEN_COWORK_CLOUD_OTLP_HEADERS only in an overlay that also creates the
# matching Secret Manager secret.
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: PROJECT
      auth:
        workloadIdentity:
          clusterLocation: CLUSTER_LOCATION
          clusterName: CLUSTER_NAME
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-cowork-cloud-secrets
  namespace: open-cowork
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: open-cowork-cloud-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPEN_COWORK_CLOUD_CONTROL_PLANE_URL
      remoteRef:
        key: open-cowork-cloud-control-plane-url
    - secretKey: OPEN_COWORK_CLOUD_COOKIE_SECRET
      remoteRef:
        key: open-cowork-cloud-cookie-secret
    - secretKey: OPEN_COWORK_CLOUD_INTERNAL_TOKEN
      remoteRef:
        key: open-cowork-cloud-internal-token
    - secretKey: OPEN_COWORK_CLOUD_SECRET_KEY_REF
      remoteRef:
        key: open-cowork-cloud-secret-key-ref
    - secretKey: OPEN_COWORK_CLOUD_OIDC_CLIENT_SECRET
      remoteRef:
        key: open-cowork-cloud-oidc-client-secret
