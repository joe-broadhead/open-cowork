name: OpenWiki CodeQL

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "43 3 * * 3"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: codeql analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: github.event.repository.private == false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: github.event.repository.private == false
        with:
          node-version: "24.x"

      - name: Install pinned pnpm
        if: github.event.repository.private == false
        run: npm install -g pnpm@11.9.0

      - name: Install dependencies
        if: github.event.repository.private == false
        run: pnpm install --frozen-lockfile

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        if: github.event.repository.private == false
        with:
          languages: javascript-typescript

      - name: Build generated assets for analysis
        if: github.event.repository.private == false
        run: pnpm build:web

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        if: github.event.repository.private == false
        with:
          category: "/language:javascript-typescript"

      - name: Private repository CodeQL notice
        if: github.event.repository.private == true
        run: |
          echo "CodeQL code scanning upload requires repository code-scanning access."
          echo "This workflow runs the CodeQL gate automatically when the repository is public."
