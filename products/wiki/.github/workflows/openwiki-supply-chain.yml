name: OpenWiki Supply Chain

on:
  workflow_dispatch:
  schedule:
    - cron: "31 5 * * 2"
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install pinned pnpm
        run: npm install -g pnpm@11.9.0
      - name: Audit high severity dependencies
        run: pnpm audit --audit-level high
      - name: Audit docs Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-audit>=2.8,<3"
          python -m pip_audit -r docs/requirements.txt

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Dependency review
        if: github.event.repository.private == false
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high

      - name: Private repository dependency-review notice
        if: github.event.repository.private == true
        run: |
          echo "Dependency review requires GitHub dependency graph support."
          echo "The action will gate pull requests automatically when the repository is public."
