name: OpenWiki Required CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: required-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-compatibility:
    name: node compatibility (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.22.3"
          - "24.x"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pinned pnpm
        run: npm install -g pnpm@11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Package smoke
        run: pnpm pack:cli

      - name: Release profile smoke
        run: pnpm release:smoke -- local-personal

  supply-chain-basics:
    name: supply-chain basics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install pinned pnpm
        run: npm install -g pnpm@11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit npm dependencies
        run: pnpm audit --audit-level high

      - name: Audit docs Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-audit>=2.8,<3"
          python -m pip_audit -r docs/requirements.txt

  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Dependency review
        if: github.event.repository.private == false
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high

      - name: Private repository dependency-review notice
        if: github.event.repository.private == true
        run: |
          echo "Dependency review requires GitHub dependency graph support."
          echo "The action will gate pull requests automatically when the repository is public."

  quality-gates:
    name: lint, security, UI, and bundle gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      - name: Install pinned pnpm
        run: npm install -g pnpm@11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser for UI gates
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Security tests
        run: pnpm test:security

      - name: Coverage gate
        run: pnpm coverage

      - name: UI smoke
        run: pnpm test:ui

      - name: UI quality
        run: pnpm test:ui-quality

      - name: Bundle size
        run: pnpm check:bundle

  docs-gate:
    name: docs gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install pinned pnpm
        run: npm install -g pnpm@11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated docs
        run: pnpm docs:reference -- --check

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict

  postgres-gate:
    name: postgres runtime gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17@sha256:0027bef26712baaee437a4ea48fdf3d2d2e2bc5f0d81615374408ca320f3c7e3
        env:
          POSTGRES_DB: openwiki
          POSTGRES_USER: openwiki
          POSTGRES_PASSWORD: openwiki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openwiki -d openwiki"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://openwiki:openwiki@127.0.0.1:5432/openwiki
      OPENWIKI_POSTGRES_TEST_DATABASE_URL: postgres://openwiki:openwiki@127.0.0.1:5432/openwiki
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      - name: Install pinned pnpm
        run: npm install -g pnpm@11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Postgres integration tests
        run: pnpm test:postgres

  perf-gate:
    name: performance smoke gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      - name: Install pinned pnpm
        run: npm install -g pnpm@11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm build:web

      - name: Performance smoke
        run: pnpm perf:check

  ci-required:
    name: ci-required
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - node-compatibility
      - supply-chain-basics
      - dependency-review
      - quality-gates
      - docs-gate
      - postgres-gate
      - perf-gate
    steps:
      - name: Verify required CI results
        env:
          NODE_COMPATIBILITY_RESULT: ${{ needs.node-compatibility.result }}
          SUPPLY_CHAIN_RESULT: ${{ needs.supply-chain-basics.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          QUALITY_GATES_RESULT: ${{ needs.quality-gates.result }}
          DOCS_GATE_RESULT: ${{ needs.docs-gate.result }}
          POSTGRES_GATE_RESULT: ${{ needs.postgres-gate.result }}
          PERF_GATE_RESULT: ${{ needs.perf-gate.result }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$NODE_COMPATIBILITY_RESULT" != "success" ]; then
            echo "node-compatibility finished with: $NODE_COMPATIBILITY_RESULT"
            exit 1
          fi
          if [ "$SUPPLY_CHAIN_RESULT" != "success" ]; then
            echo "supply-chain-basics finished with: $SUPPLY_CHAIN_RESULT"
            exit 1
          fi
          if [ "$QUALITY_GATES_RESULT" != "success" ]; then
            echo "quality-gates finished with: $QUALITY_GATES_RESULT"
            exit 1
          fi
          if [ "$DOCS_GATE_RESULT" != "success" ]; then
            echo "docs-gate finished with: $DOCS_GATE_RESULT"
            exit 1
          fi
          if [ "$POSTGRES_GATE_RESULT" != "success" ]; then
            echo "postgres-gate finished with: $POSTGRES_GATE_RESULT"
            exit 1
          fi
          if [ "$PERF_GATE_RESULT" != "success" ]; then
            echo "perf-gate finished with: $PERF_GATE_RESULT"
            exit 1
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$DEPENDENCY_REVIEW_RESULT" != "success" ]; then
              echo "dependency-review finished with: $DEPENDENCY_REVIEW_RESULT"
              exit 1
            fi
          else
            if [ "$DEPENDENCY_REVIEW_RESULT" != "skipped" ]; then
              echo "dependency-review should be skipped for $EVENT_NAME, got: $DEPENDENCY_REVIEW_RESULT"
              exit 1
            fi
          fi
          echo "Required CI passed."
