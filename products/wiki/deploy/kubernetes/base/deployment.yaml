apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwiki
  labels:
    app.kubernetes.io/name: openwiki
    app.kubernetes.io/instance: openwiki
    app.kubernetes.io/part-of: openwiki
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: openwiki
      app.kubernetes.io/instance: openwiki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openwiki
        app.kubernetes.io/instance: openwiki
        app.kubernetes.io/part-of: openwiki
    spec:
      serviceAccountName: openwiki
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openwiki
          image: ghcr.io/joe-broadhead/open-wiki:0.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          env:
            - name: OPENWIKI_ROOT
              value: /data/wiki
            - name: OPENWIKI_TITLE
              value: OpenWiki
            - name: OPENWIKI_HOST
              value: 0.0.0.0
            - name: OPENWIKI_PORT
              value: "3030"
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: wiki-data
              mountPath: /data/wiki
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: wiki-data
          persistentVolumeClaim:
            claimName: openwiki-data
        - name: tmp
          emptyDir: {}
