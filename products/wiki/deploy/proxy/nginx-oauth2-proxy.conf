# Nginx reverse proxy example for hosted OpenWiki deployments.
# Requires oauth2-proxy to run at http://oauth2-proxy:4180 and OpenWiki at http://openwiki:3030.

map $auth_user $openwiki_actor {
  # Configure oauth2-proxy to expose a stable slug-style username that matches OpenWiki ID segments.
  default "actor:user:$auth_user";
  "" "actor:user:unknown";
}

limit_req_zone $binary_remote_addr zone=openwiki_per_ip:10m rate=20r/s;

server {
  listen 443 ssl http2;
  server_name wiki.example.com;

  ssl_certificate /etc/nginx/tls/tls.crt;
  ssl_certificate_key /etc/nginx/tls/tls.key;

  # Mount or generate this file from your secret manager:
  #   set $openwiki_proxy_secret "<shared proxy secret>";
  include /etc/nginx/openwiki/openwiki-proxy-secret.conf;

  location = /oauth2/auth {
    internal;
    proxy_pass http://oauth2-proxy:4180/oauth2/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Auth-Request-Redirect $request_uri;
  }

  location /oauth2/ {
    proxy_pass http://oauth2-proxy:4180;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;
    auth_request_set $auth_user $upstream_http_x_auth_request_user;
    auth_request_set $auth_email $upstream_http_x_auth_request_email;
    auth_request_set $auth_name $upstream_http_x_auth_request_preferred_username;

    limit_req zone=openwiki_per_ip burst=100 nodelay;

    proxy_pass http://openwiki:3030;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Drop inbound spoof attempts before adding trusted OpenWiki identity.
    proxy_set_header X-OpenWiki-Actor "";
    proxy_set_header X-OpenWiki-Email "";
    proxy_set_header X-OpenWiki-Role "";
    proxy_set_header X-OpenWiki-Scopes "";
    proxy_set_header X-OpenWiki-Principals "";
    proxy_set_header X-OpenWiki-Groups "";
    proxy_set_header X-OpenWiki-Name "";
    proxy_set_header X-OpenWiki-Proxy-Secret "";

    proxy_set_header X-OpenWiki-Actor $openwiki_actor;
    proxy_set_header X-OpenWiki-Email $auth_email;
    proxy_set_header X-OpenWiki-Name $auth_name;
    proxy_set_header X-OpenWiki-Proxy-Secret $openwiki_proxy_secret;
  }
}
