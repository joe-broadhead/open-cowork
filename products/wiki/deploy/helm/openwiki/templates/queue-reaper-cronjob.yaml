{{- if .Values.queueReaper.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "openwiki.fullname" . }}-queue-reaper
  labels:
    {{- include "openwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: queue-reaper
spec:
  schedule: {{ .Values.queueReaper.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "openwiki.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: queue-reaper
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: openwiki-queue-reaper
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: "{{ .Values.image.repository }}{{- if .Values.image.digest }}@{{ .Values.image.digest }}{{- else }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{- end }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                - runs
                - reap-stale
                - --max-runtime-ms
                - {{ .Values.queueReaper.maxRuntimeMs | quote }}
              env:
                {{- include "openwiki.env" . | nindent 16 }}
              {{- with .Values.openwiki.envFrom }}
              envFrom:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: wiki-data
                  mountPath: /data/wiki
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: wiki-data
              {{- if .Values.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "openwiki.claimName" . }}
              {{- else }}
              emptyDir: {}
              {{- end }}
            - name: tmp
              emptyDir: {}
{{- end }}
