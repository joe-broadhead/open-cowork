{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "openwiki.fullname" . }}
  labels:
    {{- include "openwiki.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "openwiki.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.openwiki.port }}
      from:
        {{- if .Values.networkPolicy.ingress.from }}
        {{- toYaml .Values.networkPolicy.ingress.from | nindent 8 }}
        {{- else }}
        - podSelector:
            matchLabels:
              {{- include "openwiki.selectorLabels" . | nindent 14 }}
        {{- end }}
  egress:
    {{- if .Values.networkPolicy.egress }}
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
    {{- else }}
    []
    {{- end }}
{{- end }}
