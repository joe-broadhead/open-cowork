packages:
  - apps/*
  - mcps/*
  - packages/*
  - products/gateway
  - products/wiki
  - products/wiki/packages/*

# Supply-chain cooldown: refuse to resolve npm versions published less than this
# many minutes ago (3 days). Blunts the "compromised package published hours before
# a Dependabot run lands in the lockfile" window, since `pnpm audit` lags advisory
# publication. Frozen-lockfile CI installs are unaffected (they install exactly what
# the lockfile already pins); this only gates fresh version resolution.
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  # Explicit hardening bump to the current OpenCode runtime/SDK release. Keep
  # these exact-version exceptions narrow so the 3-day cooldown remains the
  # default for fresh dependency resolution.
  - '@opencode-ai/sdk@1.18.1'
  - 'opencode-ai@1.18.1'
  - 'opencode-darwin-arm64@1.18.1'
  - 'opencode-darwin-x64@1.18.1'
  - 'opencode-darwin-x64-baseline@1.18.1'
  - 'opencode-linux-arm64@1.18.1'
  - 'opencode-linux-arm64-musl@1.18.1'
  - 'opencode-linux-x64@1.18.1'
  - 'opencode-linux-x64-baseline@1.18.1'
  - 'opencode-linux-x64-baseline-musl@1.18.1'
  - 'opencode-linux-x64-musl@1.18.1'
  - 'opencode-windows-arm64@1.18.1'
  - 'opencode-windows-x64@1.18.1'
  - 'opencode-windows-x64-baseline@1.18.1'

onlyBuiltDependencies:
  - electron
  - esbuild
  - opencode-ai

overrides:
  "@ungap/structured-clone": 1.3.1
  "dompurify@<3.4.11": ">=3.4.11"
  electron-builder-squirrel-windows: 26.8.1
  "form-data@<4.0.6": ">=4.0.6"
  "hono@<4.12.25": ">=4.12.25"
  "ip-address@<=10.1.0": ">=10.1.1"
  # GHSA-52CP-R559-CP3M: merge-key quadratic DoS; fixed in 4.3.0 / 3.15.0.
  "js-yaml@<4.3.0": ">=4.3.0 <5"
  "js-yaml@>=3.0.0 <3.15.0": ">=3.15.0 <4"
  "mermaid>uuid": ^14.0.0
  "qs@>=6.11.1 <=6.15.1": 6.15.2
  # GHSA-23HP-3JRH-7FPW (crit) + GHSA-8X88-C5MF-7J5W (high): node-tar DoS.
  "tar@>=7.0.0 <7.5.19": ">=7.5.19"
  # GHSA-3JXR-9VMJ-R5CP: brace-expansion exponential DoS (eslint/minimatch graph).
  "brace-expansion@<1.1.16": ">=1.1.16 <2"
  "brace-expansion@>=2.0.0 <2.1.2": ">=2.1.2 <3"
  "brace-expansion@>=3.0.0 <5.0.7": ">=5.0.7"
  "tmp@<0.2.7": 0.2.7
  "undici@>=7.0.0 <7.28.0": ">=7.28.0 <8"
  "undici@<6.27.0": ^6.27.0
  "vite@>=8.0.0 <8.0.16": ">=8.0.16"

peerDependencyRules:
  allowedVersions:
    "eslint-plugin-jsx-a11y>eslint": "10"

# macOS packaging produces x64 and arm64 artifacts from the same runner.
# Linux public release artifacts are x64-only for v0.0.0, but installing both
# native CPU packages keeps local/downstream packaging deterministic when a
# builder targets another supported arch.
supportedArchitectures:
  os:
    - current
  cpu:
    - x64
    - arm64
  libc:
    - current
    - glibc
    - musl
