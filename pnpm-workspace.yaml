packages:
  - apps/*
  - mcps/*
  - packages/*

# Supply-chain cooldown: refuse to resolve npm versions published less than this
# many minutes ago (3 days). Blunts the "compromised package published hours before
# a Dependabot run lands in the lockfile" window, since `pnpm audit` lags advisory
# publication. Frozen-lockfile CI installs are unaffected (they install exactly what
# the lockfile already pins); this only gates fresh version resolution.
minimumReleaseAge: 4320

onlyBuiltDependencies:
  - electron
  - esbuild
  - opencode-ai

overrides:
  "@ungap/structured-clone": 1.3.1
  "dompurify@<3.4.11": ">=3.4.11"
  electron-builder-squirrel-windows: 26.8.1
  "form-data@<4.0.6": ">=4.0.6"
  "hono@<4.12.25": ">=4.12.25"
  "ip-address@<=10.1.0": ">=10.1.1"
  "js-yaml@<4.2.0": ">=4.2.0 <5"
  "mermaid>uuid": ^14.0.0
  "qs@>=6.11.1 <=6.15.1": 6.15.2
  "tar@>=7.0.0 <7.5.16": ">=7.5.16"
  "tmp@<0.2.7": 0.2.7
  "undici@>=7.0.0 <7.28.0": ">=7.28.0 <8"
  "undici@<6.27.0": ^6.27.0
  "vite@>=8.0.0 <8.0.16": ">=8.0.16"

peerDependencyRules:
  allowedVersions:
    "eslint-plugin-jsx-a11y>eslint": "10"

# macOS packaging produces x64 and arm64 artifacts from the same runner.
# Linux public release artifacts are x64-only for v0.0.0, but installing both
# native CPU packages keeps local/downstream packaging deterministic when a
# builder targets another supported arch.
supportedArchitectures:
  os:
    - current
  cpu:
    - x64
    - arm64
  libc:
    - current
    - glibc
    - musl
